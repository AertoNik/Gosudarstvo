<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Президент: симулятор государства</title>
  <style>
    :root {
      color-scheme: dark;
      --bg: #0d1117;
      --bg-2: #111827;
      --panel: rgba(22, 29, 42, .92);
      --panel-2: rgba(32, 42, 60, .94);
      --panel-3: rgba(15, 23, 42, .74);
      --text: #f8fafc;
      --muted: #9aa6b2;
      --line: rgba(148, 163, 184, .22);
      --line-strong: rgba(226, 232, 240, .34);
      --accent: #21c7a8;
      --accent-2: #4fa3ff;
      --danger: #ff5c7a;
      --warn: #ffbf47;
      --ok: #55d66b;
      --violet: #b487ff;
      --shadow: 0 22px 60px rgba(0, 0, 0, .33);
      --radius: 8px;
      --sidebar: 248px;
      font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    }

    body.light {
      color-scheme: light;
      --bg: #f4f7fb;
      --bg-2: #e9eef5;
      --panel: rgba(255, 255, 255, .94);
      --panel-2: rgba(248, 250, 252, .98);
      --panel-3: rgba(237, 242, 247, .9);
      --text: #111827;
      --muted: #5d6674;
      --line: rgba(50, 65, 88, .16);
      --line-strong: rgba(50, 65, 88, .28);
      --shadow: 0 20px 50px rgba(41, 55, 80, .16);
    }

    * { box-sizing: border-box; }

    html, body {
      min-height: 100%;
      margin: 0;
      background:
        radial-gradient(circle at 16% 10%, rgba(33, 199, 168, .16), transparent 29rem),
        radial-gradient(circle at 85% 20%, rgba(79, 163, 255, .14), transparent 26rem),
        linear-gradient(135deg, var(--bg) 0%, var(--bg-2) 100%);
      color: var(--text);
    }

    button, input, select, textarea {
      font: inherit;
      color: inherit;
    }

    button {
      border: 1px solid var(--line);
      background: var(--panel-2);
      border-radius: var(--radius);
      padding: 9px 12px;
      min-height: 38px;
      cursor: pointer;
      transition: transform .16s ease, border-color .16s ease, background .16s ease, box-shadow .16s ease;
    }

    button:hover {
      transform: translateY(-1px);
      border-color: var(--line-strong);
      box-shadow: 0 8px 22px rgba(0, 0, 0, .18);
    }

    button.primary {
      background: linear-gradient(135deg, var(--accent), var(--accent-2));
      color: #06111a;
      border: 0;
      font-weight: 800;
    }

    button.danger {
      background: color-mix(in oklab, var(--danger) 22%, var(--panel-2));
      border-color: color-mix(in oklab, var(--danger) 45%, transparent);
    }

    button.ghost {
      background: transparent;
    }

    button.icon {
      width: 40px;
      min-width: 40px;
      padding: 0;
      display: inline-grid;
      place-items: center;
      font-weight: 900;
    }

    button.active,
    .pill.active {
      border-color: color-mix(in oklab, var(--accent) 70%, white 10%);
      background: color-mix(in oklab, var(--accent) 18%, var(--panel-2));
    }

    input, select, textarea {
      width: 100%;
      min-height: 38px;
      border: 1px solid var(--line);
      border-radius: var(--radius);
      background: var(--panel-3);
      padding: 9px 10px;
      outline: none;
      transition: border-color .16s ease, background .16s ease, box-shadow .16s ease;
    }

    textarea {
      min-height: 98px;
      resize: vertical;
      line-height: 1.45;
    }

    input[type="range"] {
      padding: 0;
      min-height: 26px;
    }

    input[type="color"] {
      padding: 3px;
      height: 38px;
    }

    input:focus, select:focus, textarea:focus {
      border-color: var(--accent-2);
      box-shadow: 0 0 0 3px rgba(79, 163, 255, .16);
    }

    label {
      display: grid;
      gap: 6px;
      font-size: 12px;
      letter-spacing: .02em;
      color: var(--muted);
      text-transform: uppercase;
    }

    .shell {
      min-height: 100vh;
      display: grid;
      grid-template-columns: var(--sidebar) minmax(0, 1fr);
    }

    .sidebar {
      position: sticky;
      top: 0;
      height: 100vh;
      border-right: 1px solid var(--line);
      background: rgba(7, 12, 20, .62);
      backdrop-filter: blur(20px);
      padding: 18px 14px;
      display: grid;
      grid-template-rows: auto 1fr auto;
      gap: 18px;
      z-index: 5;
    }

    body.light .sidebar { background: rgba(246, 249, 252, .72); }

    .brand {
      display: grid;
      grid-template-columns: 54px 1fr;
      align-items: center;
      gap: 12px;
      min-width: 0;
    }

    .seal {
      width: 54px;
      height: 54px;
      border-radius: 50%;
      border: 1px solid var(--line-strong);
      display: grid;
      place-items: center;
      overflow: hidden;
      background: conic-gradient(from 160deg, var(--accent), var(--accent-2), var(--warn), var(--accent));
      box-shadow: inset 0 0 0 7px rgba(0, 0, 0, .18), 0 12px 32px rgba(0, 0, 0, .22);
    }

    .seal span {
      width: 34px;
      height: 34px;
      border-radius: 50%;
      display: grid;
      place-items: center;
      background: rgba(5, 10, 18, .68);
      color: white;
      font-weight: 900;
      overflow: hidden;
    }

    .seal img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      display: block;
    }

    .brand h1 {
      margin: 0;
      font-size: 17px;
      line-height: 1.15;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .brand p {
      margin: 4px 0 0;
      color: var(--muted);
      font-size: 12px;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .nav {
      display: grid;
      gap: 6px;
      align-content: start;
      overflow: auto;
      padding-right: 4px;
    }

    .nav button {
      min-height: 42px;
      display: grid;
      grid-template-columns: 30px 1fr auto;
      align-items: center;
      gap: 8px;
      text-align: left;
      border-color: transparent;
      background: transparent;
      color: var(--muted);
    }

    .nav button:hover,
    .nav button.active {
      color: var(--text);
      background: var(--panel-2);
      border-color: var(--line);
    }

    .nav .nav-icon {
      width: 30px;
      height: 30px;
      border-radius: 8px;
      display: grid;
      place-items: center;
      background: var(--panel-3);
      font-weight: 900;
    }

    .side-foot {
      display: grid;
      gap: 10px;
    }

    .mini-stat {
      border: 1px solid var(--line);
      border-radius: var(--radius);
      background: var(--panel);
      padding: 10px;
      display: grid;
      gap: 6px;
      font-size: 12px;
      color: var(--muted);
    }

    .mini-stat strong {
      color: var(--text);
      font-size: 20px;
      line-height: 1;
    }

    .main {
      min-width: 0;
      padding: 18px;
    }

    .topbar {
      position: sticky;
      top: 0;
      z-index: 4;
      display: grid;
      grid-template-columns: minmax(220px, 1fr) auto;
      align-items: center;
      gap: 14px;
      margin: -18px -18px 18px;
      padding: 14px 18px;
      border-bottom: 1px solid var(--line);
      background: color-mix(in oklab, var(--bg) 74%, transparent);
      backdrop-filter: blur(20px);
    }

    .top-title {
      min-width: 0;
      display: grid;
      gap: 2px;
    }

    .top-title h2 {
      margin: 0;
      font-size: clamp(20px, 3vw, 32px);
      line-height: 1.05;
    }

    .top-title p {
      margin: 0;
      color: var(--muted);
      font-size: 13px;
    }

    .top-actions {
      display: flex;
      align-items: center;
      justify-content: flex-end;
      gap: 8px;
      flex-wrap: wrap;
    }

    .speedbar {
      display: inline-flex;
      gap: 4px;
      padding: 4px;
      border: 1px solid var(--line);
      border-radius: var(--radius);
      background: var(--panel);
    }

    .speedbar button {
      min-height: 32px;
      padding: 5px 8px;
      border-color: transparent;
      background: transparent;
      box-shadow: none;
    }

    .speedbar button.active {
      background: var(--panel-2);
      border-color: var(--line);
    }

    .grid {
      display: grid;
      gap: 14px;
    }

    .grid.two { grid-template-columns: repeat(2, minmax(0, 1fr)); }
    .grid.three { grid-template-columns: repeat(3, minmax(0, 1fr)); }
    .grid.four { grid-template-columns: repeat(4, minmax(0, 1fr)); }
    .grid.five { grid-template-columns: repeat(5, minmax(0, 1fr)); }
    .grid.split { grid-template-columns: minmax(0, 1.45fr) minmax(310px, .8fr); }
    .grid.wide { grid-template-columns: minmax(0, 1fr) minmax(360px, .42fr); }

    .panel {
      border: 1px solid var(--line);
      border-radius: var(--radius);
      background: var(--panel);
      box-shadow: var(--shadow);
      min-width: 0;
      overflow: hidden;
    }

    .panel.pad { padding: 14px; }

    .panel-head {
      padding: 13px 14px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 10px;
      border-bottom: 1px solid var(--line);
      background: color-mix(in oklab, var(--panel-2) 78%, transparent);
    }

    .panel-head h3,
    .section-title {
      margin: 0;
      font-size: 15px;
      line-height: 1.2;
    }

    .panel-head small,
    .subtle {
      color: var(--muted);
      font-size: 12px;
    }

    .metric-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(190px, 1fr));
      gap: 10px;
    }

    .command-center {
      border: 1px solid var(--line);
      border-radius: var(--radius);
      background:
        linear-gradient(90deg, rgba(5, 10, 18, .92), rgba(8, 18, 32, .74)),
        repeating-linear-gradient(115deg, rgba(255,255,255,.065), rgba(255,255,255,.065) 1px, transparent 1px, transparent 24px),
        linear-gradient(135deg, color-mix(in oklab, var(--accent) 28%, transparent), color-mix(in oklab, var(--accent-2) 20%, transparent));
      box-shadow: var(--shadow);
      overflow: hidden;
      min-height: 230px;
      display: grid;
      grid-template-columns: minmax(0, 1fr) minmax(320px, .62fr);
      position: relative;
    }

    body.light .command-center {
      background:
        linear-gradient(90deg, rgba(255,255,255,.92), rgba(235, 244, 255, .74)),
        repeating-linear-gradient(115deg, rgba(20,30,45,.055), rgba(20,30,45,.055) 1px, transparent 1px, transparent 24px),
        linear-gradient(135deg, color-mix(in oklab, var(--accent) 18%, transparent), color-mix(in oklab, var(--accent-2) 14%, transparent));
    }

    .command-main {
      padding: clamp(18px, 3vw, 28px);
      display: grid;
      align-content: end;
      gap: 16px;
      min-width: 0;
    }

    .command-main h3 {
      margin: 0;
      font-size: clamp(28px, 4.6vw, 54px);
      line-height: .95;
      max-width: 880px;
    }

    .command-main p {
      margin: 0;
      color: color-mix(in oklab, var(--text) 74%, var(--muted));
      line-height: 1.5;
      max-width: 760px;
    }

    .command-side {
      border-left: 1px solid var(--line);
      padding: 18px;
      display: grid;
      align-content: center;
      gap: 12px;
      background: color-mix(in oklab, var(--panel) 76%, transparent);
      min-width: 0;
    }

    .state-flag {
      width: min(220px, 100%);
      aspect-ratio: 7 / 4;
      border-radius: 8px;
      border: 1px solid var(--line-strong);
      overflow: hidden;
      box-shadow: 0 18px 42px rgba(0,0,0,.28);
      display: grid;
    }

    .state-flag img,
    .coat-seal img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      display: block;
    }

    .state-flag span { min-width: 0; min-height: 0; }

    .coat-seal {
      width: 96px;
      height: 96px;
      border-radius: 50%;
      border: 1px solid var(--line-strong);
      background:
        radial-gradient(circle at 35% 25%, color-mix(in oklab, var(--warn) 38%, transparent), transparent 34%),
        linear-gradient(135deg, var(--panel-2), var(--panel-3));
      display: grid;
      place-items: center;
      overflow: hidden;
      box-shadow: inset 0 0 0 7px rgba(255,255,255,.04), 0 16px 36px rgba(0,0,0,.24);
      color: var(--warn);
      font-size: 38px;
      font-weight: 900;
      flex: 0 0 auto;
    }

    .identity-stack {
      display: grid;
      grid-template-columns: auto 1fr;
      align-items: center;
      gap: 14px;
      min-width: 0;
    }

    .visual-card {
      display: grid;
      grid-template-columns: minmax(180px, .6fr) minmax(0, 1fr);
      gap: 12px;
      align-items: center;
    }

    .upload-note {
      color: var(--muted);
      font-size: 12px;
      line-height: 1.45;
      margin: 0;
    }

    .status-strip {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(132px, 1fr));
      gap: 8px;
    }

    .status-chip,
    .sector-card,
    .project-card,
    .crisis-card {
      border: 1px solid var(--line);
      border-radius: var(--radius);
      background: color-mix(in oklab, var(--panel-3) 86%, transparent);
      min-width: 0;
    }

    .status-chip {
      padding: 10px;
      display: grid;
      gap: 5px;
    }

    .status-chip span {
      color: var(--muted);
      font-size: 11px;
      text-transform: uppercase;
      letter-spacing: .03em;
    }

    .status-chip strong {
      font-size: 18px;
      line-height: 1;
    }

    .signal-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(210px, 1fr));
      gap: 10px;
    }

    .signal-card {
      border: 1px solid var(--line);
      border-radius: var(--radius);
      background: var(--panel-3);
      padding: 12px;
      display: grid;
      gap: 9px;
      min-height: 124px;
    }

    .signal-card header,
    .project-card header,
    .crisis-card header,
    .sector-card header {
      display: flex;
      align-items: start;
      justify-content: space-between;
      gap: 10px;
      min-width: 0;
    }

    .signal-card strong,
    .project-card strong,
    .crisis-card strong,
    .sector-card strong {
      min-width: 0;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .sector-card,
    .project-card,
    .crisis-card {
      padding: 12px;
      display: grid;
      gap: 10px;
    }

    .project-card {
      min-height: 214px;
    }

    .project-card.paused {
      opacity: .68;
    }

    .project-card.done {
      border-color: color-mix(in oklab, var(--ok) 60%, transparent);
      background: color-mix(in oklab, var(--ok) 9%, var(--panel-3));
    }

    .crisis-card.high {
      border-color: color-mix(in oklab, var(--danger) 56%, transparent);
      background: color-mix(in oklab, var(--danger) 10%, var(--panel-3));
    }

    .crisis-card.medium {
      border-color: color-mix(in oklab, var(--warn) 50%, transparent);
      background: color-mix(in oklab, var(--warn) 9%, var(--panel-3));
    }

    .mini-bars {
      display: grid;
      gap: 7px;
    }

    .mini-bar {
      display: grid;
      grid-template-columns: 92px 1fr 42px;
      align-items: center;
      gap: 8px;
      font-size: 12px;
      color: var(--muted);
      min-width: 0;
    }

    .mini-bar > span:first-child {
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }

    .agenda-list {
      display: grid;
      gap: 8px;
    }

    .agenda-item {
      display: grid;
      grid-template-columns: 1fr auto;
      gap: 10px;
      align-items: center;
      border: 1px solid var(--line);
      border-radius: var(--radius);
      background: var(--panel-3);
      padding: 10px;
    }

    .metric {
      border: 1px solid var(--line);
      border-radius: var(--radius);
      padding: 12px;
      background: var(--panel-3);
      display: grid;
      gap: 8px;
      min-height: 104px;
      position: relative;
      overflow: hidden;
    }

    .metric::after {
      content: "";
      position: absolute;
      inset: auto 0 0;
      height: 3px;
      background: linear-gradient(90deg, var(--accent), var(--accent-2));
      opacity: .74;
    }

    .metric .label {
      color: var(--muted);
      font-size: 12px;
      text-transform: uppercase;
      letter-spacing: .03em;
    }

    .metric .value {
      font-size: clamp(22px, 2.4vw, 34px);
      font-weight: 850;
      letter-spacing: 0;
      line-height: 1;
    }

    .metric .delta {
      color: var(--muted);
      font-size: 12px;
    }

    .delta.good { color: var(--ok); }
    .delta.bad { color: var(--danger); }
    .delta.warn { color: var(--warn); }

    .kpi-strip {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(140px, 1fr));
      gap: 8px;
    }

    .kpi {
      padding: 9px 10px;
      border-radius: var(--radius);
      border: 1px solid var(--line);
      background: var(--panel-3);
      display: grid;
      gap: 4px;
    }

    .kpi span {
      color: var(--muted);
      font-size: 11px;
      text-transform: uppercase;
      letter-spacing: .03em;
    }

    .kpi strong {
      font-size: 16px;
      line-height: 1.1;
    }

    .list {
      display: grid;
      gap: 8px;
    }

    .row {
      display: grid;
      grid-template-columns: 1fr auto;
      gap: 10px;
      align-items: center;
      padding: 10px;
      border: 1px solid var(--line);
      border-radius: var(--radius);
      background: var(--panel-3);
      min-width: 0;
    }

    .row.compact {
      grid-template-columns: auto 1fr auto;
      padding: 8px;
    }

    .row strong,
    .row span {
      min-width: 0;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .pill {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 6px;
      min-height: 30px;
      padding: 5px 9px;
      border: 1px solid var(--line);
      border-radius: 999px;
      background: var(--panel-3);
      color: var(--muted);
      font-size: 12px;
      white-space: nowrap;
    }

    .toolbar {
      display: flex;
      gap: 8px;
      align-items: center;
      flex-wrap: wrap;
    }

    .form-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(190px, 1fr));
      gap: 12px;
    }

    .form-grid.narrow {
      grid-template-columns: repeat(auto-fit, minmax(140px, 1fr));
    }

    .form-grid.full label {
      min-width: 0;
    }

    .actions {
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
      align-items: center;
    }

    .policy-action-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(255px, 1fr));
      gap: 10px;
      align-items: stretch;
    }

    .policy-action-card {
      position: relative;
      overflow: hidden;
      min-height: 250px;
      padding: 12px;
      border: 1px solid var(--line);
      border-radius: var(--radius);
      background:
        linear-gradient(145deg, color-mix(in oklab, var(--panel-2) 74%, transparent), var(--panel-3)),
        var(--panel-3);
      display: grid;
      grid-template-rows: auto auto 1fr auto;
      gap: 10px;
    }

    .policy-action-card::before {
      content: "";
      position: absolute;
      inset: 0 auto 0 0;
      width: 3px;
      background: var(--accent-2);
      opacity: .82;
    }

    .policy-action-card.good { border-color: color-mix(in oklab, var(--ok) 36%, var(--line)); }
    .policy-action-card.warn { border-color: color-mix(in oklab, var(--warn) 34%, var(--line)); }
    .policy-action-card.bad { border-color: color-mix(in oklab, var(--danger) 34%, var(--line)); }
    .policy-action-card.civic { border-color: color-mix(in oklab, var(--accent-2) 38%, var(--line)); }
    .policy-action-card.institution { border-color: color-mix(in oklab, var(--violet) 34%, var(--line)); }

    .policy-action-card.good::before { background: var(--ok); }
    .policy-action-card.warn::before { background: var(--warn); }
    .policy-action-card.bad::before { background: var(--danger); }
    .policy-action-card.civic::before { background: var(--accent-2); }
    .policy-action-card.institution::before { background: var(--violet); }

    .policy-action-card header {
      display: flex;
      align-items: flex-start;
      justify-content: space-between;
      gap: 10px;
      min-width: 0;
    }

    .policy-action-card h4 {
      margin: 0;
      font-size: 16px;
      line-height: 1.18;
      letter-spacing: 0;
    }

    .policy-action-card p {
      margin: 0;
      color: var(--muted);
      font-size: 13px;
      line-height: 1.45;
    }

    .policy-tags {
      display: grid;
      gap: 6px;
      align-content: start;
    }

    .policy-tag {
      display: grid;
      grid-template-columns: 82px 1fr;
      gap: 8px;
      align-items: start;
      min-width: 0;
      padding: 8px;
      border: 1px solid rgba(148, 163, 184, .16);
      border-radius: var(--radius);
      background: rgba(15, 23, 42, .32);
      color: var(--muted);
      font-size: 12px;
      line-height: 1.35;
    }

    .policy-tag strong {
      color: var(--text);
      font-size: 11px;

      function clamp(value, min, max) {
        return Math.max(min, Math.min(max, value));
      }

      function rnd(min, max) {
        return min + Math.random() * (max - min);
      }

      function pick(list) {
        return list[Math.floor(Math.random() * list.length)];
      }

      function uid(prefix) {
        return prefix + "_" + Math.random().toString(36).slice(2, 9) + Date.now().toString(36).slice(-4);
      }

      function esc(value) {
        return String(value ?? "").replace(/[&<>"']/g, ch => ({ "&": "&amp;", "<": "&lt;", ">": "&gt;", '"': "&quot;", "'": "&#39;" }[ch]));
      }

      function num(value, fallback = 0) {
        const n = Number(value);
        return Number.isFinite(n) ? n : fallback;
      }

      function pct(value, digits = 1) {
        return `${Number(value).toFixed(digits)}%`;
      }

      function money(value, currency = state?.country?.currency || "кред.") {
        const n = Number(value);
        const abs = Math.abs(n);
        let text;
        if (abs >= 1000000) text = (n / 1000000).toFixed(2) + " трлн";
        else if (abs >= 1000) text = (n / 1000).toFixed(2) + " млрд";
        else text = n.toFixed(1) + " млн";
        return `${text} ${currency}`;
      }

      function compact(value) {
        const n = Number(value);
        const abs = Math.abs(n);
        if (abs >= 1000000000) return (n / 1000000000).toFixed(2) + " млрд";
        if (abs >= 1000000) return (n / 1000000).toFixed(2) + " млн";
        if (abs >= 1000) return (n / 1000).toFixed(1) + " тыс.";
        return String(Math.round(n));
      }

      function formatDate(d) {
        return `${String(d.day).padStart(2, "0")}.${String(d.month).padStart(2, "0")}.${d.year}`;
      }

      function dateLabel(d) {
        const names = ["января","февраля","марта","апреля","мая","июня","июля","августа","сентября","октября","ноября","декабря"];
        return `${d.day} ${names[d.month - 1]} ${d.year}`;
      }

      function notify(text, tone = "info", title = "Уведомление") {
        if (!document.createElement || !toastBox?.appendChild) {
          console.log(text);
          return;
        }
        const id = "toast_" + (++toastSeq);
        const item = document.createElement("div");
        item.className = `toast-message ${tone}`;
        item.dataset.toastId = id;
        item.innerHTML = `
          <div><strong>${esc(title)}</strong><span>${esc(text)}</span></div>
          <button class="toast-close" data-action="dismiss-toast" data-toast-id="${id}" title="Закрыть">×</button>
        `;
        toastBox.appendChild(item);
        setTimeout(() => item.remove(), 3600);
      }

      function sanitizeImageData(value, maxLength = 520000) {
        return typeof value === "string" && value.length <= maxLength ? value : "";
      }

      function notifyStorageOnce(text) {
        const now = Date.now();
        if (now - lastStorageWarningAt < 30000) return;
        lastStorageWarningAt = now;
        notify(text);
      }

      function serializeStateForStorage(game = state, level = "normal") {
        const copy = JSON.parse(JSON.stringify(game));
        const historyLimit = level === "tiny" || level === "safe" ? 60 : 180;
        const newsLimit = level === "tiny" || level === "safe" ? 24 : 90;
        copy.news = (copy.news || []).slice(0, newsLimit);
        if (copy.diplomacy?.inbox) copy.diplomacy.inbox = copy.diplomacy.inbox.slice(0, level === "normal" ? 10 : 4);
        if (copy.history) {
          for (const key of Object.keys(copy.history)) copy.history[key] = (copy.history[key] || []).slice(-historyLimit);
        }
        if (level === "safe") {
          if (copy.country?.president) copy.country.president.photo = "";
          if (copy.country?.flag) copy.country.flag.image = "";
          if (copy.country) copy.country.coatImage = "";
        }
        return copy;
      }

      function compactExistingSlots() {
        const raw = localStorage.getItem(SLOTS_KEY);
        if (!raw) return false;
        try {
          const slots = JSON.parse(raw);
          const compacted = {};
          for (const [slot, save] of Object.entries(slots || {})) {
            compacted[slot] = serializeStateForStorage(migrateState(save), "tiny");
          }
          localStorage.removeItem(SLOTS_KEY);
          try {
            localStorage.setItem(SLOTS_KEY, JSON.stringify(compacted));
          } catch {
            const safeSlots = {};
            for (const [slot, save] of Object.entries(compacted)) safeSlots[slot] = serializeStateForStorage(save, "safe");
            localStorage.setItem(SLOTS_KEY, JSON.stringify(safeSlots));
          }
          return true;
        } catch (err) {
          console.warn(err);
          try { localStorage.setItem(SLOTS_KEY, raw); } catch {}
          return false;
        }
      }

      function saveState(options = {}) {
        if (!state) return;
        const now = Date.now();
        if (!options.force && now - lastSaveAt < 1500) return true;
        state.lastSaved = new Date().toISOString();
        try {
          localStorage.setItem(STORAGE_KEY, JSON.stringify(serializeStateForStorage(state, "normal")));
          lastSaveAt = now;
          return true;
        } catch (err) {
          console.warn(err);
          try {
            compactExistingSlots();
            localStorage.setItem(STORAGE_KEY, JSON.stringify(serializeStateForStorage(state, "tiny")));
            lastSaveAt = now;
            notifyStorageOnce("Хранилище оптимизировано: старые новости и графики в слотах сжаты.");
            return true;
          } catch (retryErr) {
            console.warn(retryErr);
            try {
              localStorage.setItem(STORAGE_KEY, JSON.stringify(serializeStateForStorage(state, "safe")));
              lastSaveAt = now;
              notifyStorageOnce("Сохранение записано без изображений: LocalStorage слишком мал для текущих фото.");
              return true;
            } catch (safeErr) {
              console.warn(safeErr);
              notifyStorageOnce("LocalStorage переполнен. Экспортируйте сохранение или очистите старые слоты.");
              return false;
            }
          }
        }
      }

      function queueSave(delay = 900) {
        clearTimeout(saveTimer);
        saveTimer = setTimeout(() => saveState({ force: true }), delay);
      }

      function loadState() {
        try {
          const raw = localStorage.getItem(STORAGE_KEY);
          if (!raw) return null;
          const loaded = JSON.parse(raw);
          return migrateState(loaded);
        } catch (err) {
          console.warn(err);
          return null;
        }
      }

      function migrateState(loaded) {
        if (!loaded || typeof loaded !== "object") return null;
        loaded.version = 5;
        loaded.news ||= [];
        loaded.history = Object.assign(emptyHistory(), loaded.history || {});
        loaded.diplomacy ||= { countries: createWorldCountries([]), organizations: defaultOrganizations() };
        loaded.diplomacy.countries = (loaded.diplomacy.countries || createWorldCountries([])).map(applyCountryProfile);
        loaded.diplomacy.organizations ||= defaultOrganizations();
        loaded.diplomacy.inbox ||= [];
        loaded.diplomacy.inbox = loaded.diplomacy.inbox.slice(0, 8);
        loaded.tech ||= createTech();
        loaded.population ||= defaultPopulation(14500000);
        loaded.military = migrateMilitary(loaded.military);
        loaded.military.wars = (loaded.military.wars || []).map(normalizeWar);
        loaded.politics ||= defaultPolitics({});
        loaded.economy ||= defaultEconomy();
        loaded.governance = migrateGovernance(loaded.governance);
        loaded.regions ||= defaultRegions();
        loaded.country ||= {};
        loaded.country.flag ||= { colors: ["#1f8fff", "#f8fafc", "#21c7a8"], layout: "horizontal" };
        loaded.country.flag.colors ||= ["#1f8fff", "#f8fafc", "#21c7a8"];
        loaded.country.flag.layout ||= "horizontal";
        loaded.country.flag.image ||= "";
        loaded.country.coat ||= "Государственный герб";
        loaded.country.coatImage ||= "";
        loaded.country.flag.image = sanitizeImageData(loaded.country.flag.image);
        loaded.country.coatImage = sanitizeImageData(loaded.country.coatImage);
        if (loaded.country.president) loaded.country.president.photo = sanitizeImageData(loaded.country.president.photo);
        for (const r of loaded.regions) r.buildings ||= emptyBuildings();
        if (!loaded.history.date?.length) pushHistory(loaded);
        return loaded;
      }

      function migrateGovernance(value) {
        const base = defaultGovernance();
        const g = value && typeof value === "object" ? value : {};
        return {
          agenda: mergeById(base.agenda, g.agenda),
          services: mergeById(base.services, g.services),
          sectors: mergeById(base.sectors, g.sectors),
          projects: mergeById(base.projects, g.projects),
          media: Object.assign(base.media, g.media || {}),
          intelligence: Object.assign(base.intelligence, g.intelligence || {}),
          crises: Array.isArray(g.crises) ? g.crises : base.crises
        };
      }

      function mergeById(base, incoming) {
        const map = new Map((Array.isArray(incoming) ? incoming : []).map(item => [item.id, item]));
        return base.map(item => Object.assign({}, item, map.get(item.id) || {}));
      }

        const base = defaultMilitary();
        const m = Object.assign(base, value || {});
        m.doctrine ||= base.doctrine;
        m.logistics = num(m.logistics, base.logistics);
        m.training = num(m.training, base.training);
        m.recon = num(m.recon, base.recon);

        m.navalPower = num(m.navalPower, base.navalPower);
        m.medical = num(m.medical, base.medical);
        m.command = num(m.command, base.command);
        m.warExhaustion = num(m.warExhaustion, base.warExhaustion);
        m.veterans = num(m.veterans, base.veterans);
        m.lastWarOutcome ||= base.lastWarOutcome;
        m.warTreaties ||= [];
        m.operations ||= [];
        m.wars ||= [];
        return m;
      }

      function pushNews(game, category, title, text, impact = {}) {
        game.news.unshift({ id: uid("news"), date: formatDate(game.date), category, title, text, impact });
        game.news = game.news.slice(0, 240);
      }

      function pushHistory(game) {
        const h = game.history;
        const income = calcIncome(game);
        const expenses = calcExpenses(game);
        h.date.push(formatDate(game.date));
        h.gdp.push(Number(game.economy.gdp.toFixed(2)));
        h.inflation.push(Number(game.economy.inflation.toFixed(2)));
        h.popularity.push(Number(game.politics.popularity.toFixed(2)));
        h.army.push(Number(calcArmyPower(game).toFixed(2)));
        h.population.push(Math.round(game.population.total));
        h.unemployment.push(Number(game.economy.unemployment.toFixed(2)));
        h.income.push(Number(income.toFixed(2)));
        h.expenses.push(Number(expenses.toFixed(2)));
        h.risk.push(Number(calcNationalRisk(game).toFixed(2)));
        h.governance.push(Number(calcGovernanceScore(game).toFixed(2)));
        h.services.push(Number(calcServiceScore(game).toFixed(2)));
        for (const key of Object.keys(h)) h[key] = h[key].slice(-420);
      }

      function calcIncome(game = state) {
        const e = game.economy;
        const t = e.taxes;
        const base = e.gdp * ((t.income * .19 + t.vat * .23 + t.corporate * .18 + t.property * .05 + t.export * .04) / 100);
        return base + e.exports * .035 + e.stateCompanies * 140;
      }

      function calcExpenses(game = state) {
        const e = game.economy;
        const spend = Object.values(e.spending).reduce((a, b) => a + b, 0) / 100;
        return e.gdp * spend * .23 + e.debt * (e.keyRate / 100) / 12 + e.pensions * game.population.total / 1000000 * .09;
      }

      function calcArmyPower(game = state) {
        const m = game.military;
        const parts = calcArmyComponents(game);
        return parts.total;
      }

      function calcArmyComponents(game = state) {
        const m = game.military;
        const manpower = Math.log10(Math.max(10000, m.land + m.mobilized * .55 + m.manpower * .12)) * 12;
        const equipment = m.air * .07 + m.navy * .22 + m.airDefense * .12 + m.strategic * 1.0 + m.special / 5000 + m.artillery * .22 + m.armor * .2 + m.drones * .18;
        const quality = m.readiness * .32 + m.morale * .22 + m.training * .25 + m.command * .27 + m.contractShare * .08 + m.veterans * .14;
        const support = m.logistics * .32 + m.recon * .23 + m.cyber * .2 + m.airSuperiority * .18 + m.navalPower * .09 + m.medical * .12;
        const industry = m.industry * .16 + m.research * .08 + game.economy.spending.defense * .18;
        const exhaustion = m.warExhaustion * .55 + game.military.wars.length * 5;
        const total = clamp(manpower + equipment + quality + support + industry - exhaustion, 40, 420);
        return { manpower, equipment, quality, support, industry, exhaustion, total };
      }

      function calcEnemyWarPower(country, war = null, game = state) {
        if (!country) return 120;
        const economicDepth = Math.sqrt(Math.max(1000, country.gdp)) / 10;
        const populationDepth = Math.sqrt(Math.max(200000, country.population)) / 120;
        const force = country.military * 3.05;
        const intel = country.intelligence * .55;
        const stability = country.stability * .32;
        const greatPowerBonus = country.greatPower ? 95 : country.gdp > 1200000 ? 35 : 0;
        const homelandBonus = country.population > 100000000 ? 32 : country.population > 50000000 ? 16 : 0;
        const alliancePenalty = country.alliance ? -18 : 0;
        const sanctionsPenalty = country.sanctions || country.embargo ? 28 : 0;
        const fatiguePenalty = war ? war.fatigue * .32 + Math.max(0, war.control - 55) * .25 : 0;
        return clamp(force + economicDepth + populationDepth + intel + stability + greatPowerBonus + homelandBonus + alliancePenalty - sanctionsPenalty - fatiguePenalty, 35, 1200);
      }

      function calcWarBalance(game, rawWar) {
        const war = normalizeWar(rawWar);
        const enemy = game.diplomacy.countries.find(x => x.id === war.enemyId || x.name === war.enemy);
        const own = calcArmyComponents(game);
        const enemyPower = calcEnemyWarPower(enemy, war, game);
        const ownOperational = own.total + war.supply * .6 + game.military.recon * .32 + game.military.command * .36 + game.military.drones * .2 + game.military.airSuperiority * .22 - war.fatigue * .42 - game.military.warExhaustion * .36;
        const enemyOperational = enemyPower + war.intensity * .52 + Math.max(0, 50 - war.control) * .24;
        const balance = ownOperational - enemyOperational;
        const initiative = clamp(50 + balance * .23 + (war.control - 50) * .22 + rnd(-2.5, 2.5), 0, 100);
        const status = initiative >= 62 ? "инициатива у нас" : initiative <= 38 ? "инициатива у противника" : "равновесие фронта";
        return { ownPower: own.total, enemyPower, ownOperational, enemyOperational, balance, initiative, status, enemy };
      }

      function calcPreWarAssessment(country, game = state) {
        const own = calcArmyComponents(game);
        const enemyPower = calcEnemyWarPower(country, null, game);
        const ratio = own.total / Math.max(1, enemyPower);
        const initiative = clamp(50 + (own.total - enemyPower) * .075 + game.military.recon * .05 + game.military.logistics * .04 - (country?.intelligence || 50) * .035, 1, 99);
        const victoryChance = clamp(8 + ratio * 42 + (game.military.readiness - 55) * .18 + (game.military.morale - 55) * .12 - (country?.stability || 50) * .08, 3, 92);
        const risk = ratio >= 1.25 ? "advantage" : ratio >= .82 ? "parity" : ratio >= .48 ? "danger" : "catastrophic";
        const label = risk === "advantage" ? "перевес у нас"
          : risk === "parity" ? "примерный паритет"
          : risk === "danger" ? "перевес противника"
          : "критическое превосходство противника";
        const tone = risk === "advantage" ? "good" : risk === "parity" ? "warn" : "bad";
        return { ownPower: own.total, enemyPower, ratio, initiative, victoryChance, risk, label, tone };
      }

      function powerIndex(value) {
        return Math.round(value).toLocaleString("ru-RU");
      }

      function totalBuildings(key, game = state) {
        return game.regions.reduce((sum, r) => sum + (r.buildings[key] || 0), 0);
      }

      function avg(list, key) {
        return list.length ? list.reduce((sum, item) => sum + num(item[key]), 0) / list.length : 0;
      }

      function calcCrisisPressure(game = state) {
        return avg(game.governance?.crises || [], "severity");
      }

      function calcServiceScore(game = state) {
        const services = game.governance?.services || [];
        return clamp(avg(services, "level") - avg(services, "stress") * .18, 0, 100);
      }

      function calcNationalRisk(game = state) {
        const e = game.economy;
        const p = game.politics;
        const g = game.governance;
        const wars = game.military.wars.length * 12;
        const intel = (g?.intelligence?.cyberThreat || 0) * .16 + (g?.intelligence?.domesticRisk || 0) * .18;
        const media = (g?.media?.polarization || 0) * .12 + Math.max(0, 45 - (g?.media?.trust || 0)) * .18;
        return clamp(e.inflation * 1.6 + e.unemployment * 1.9 + p.protests * .45 + p.corruption * .22 + calcCrisisPressure(game) * .38 + wars + intel + media, 0, 100);
      }

      function calcGovernanceScore(game = state) {
        const p = game.politics;
        const g = game.governance;
        const projectBonus = avg((g?.projects || []).filter(x => x.status !== "paused"), "progress") * .08;
        return clamp(p.popularity * .25 + p.coalition * .22 + (100 - p.corruption) * .18 + calcServiceScore(game) * .25 + projectBonus, 0, 100);
      }

      function topAgenda(game = state) {
        return [...(game.governance?.agenda || [])].sort((a, b) => b.pressure - a.pressure)[0];

      function trendText(value) {
        const n = num(value);
        if (n > .05) return "растет";

      function init() {
        state = loadState();
        document.body.classList.toggle("light", state?.theme === "light");
        if (state) {
          selectedRegionId = state.regions[0]?.id || null;
          selectedCountryId = state.diplomacy.countries[0]?.id || null;
        }
        render();
        bindGlobalEvents();
        startTimer();
      }

      function bindGlobalEvents() {
        document.addEventListener("click", onClick);
        document.addEventListener("input", onInput);
        document.addEventListener("change", onChange);
        document.addEventListener("submit", onSubmit);
        document.addEventListener("pointermove", markInteraction, { passive: true });
        document.addEventListener("pointerdown", markInteraction, true);
        document.addEventListener("scroll", markScroll, true);
        document.addEventListener("focusout", () => setTimeout(() => scheduleRender({ force: true, preserveScroll: true }), 80));
        document.addEventListener("keydown", event => {
          markInteraction();
          if (event.key === "Escape" && modal) {
            modal = null;
            render({ force: true, preserveScroll: true });
          }
        });
        importFile.addEventListener("change", importSaveFile);
      }

      function startTimer() {
        if (timer) clearInterval(timer);
        timer = setInterval(() => {
          if (!state || !state.speed) return;
          for (let i = 0; i < state.speed; i++) tickDay(state);
          queueSave(5000);
          scheduleRender({ passive: true });
        }, DAY_MS);
      }

      function markInteraction() {
        lastInteractionAt = Date.now();
      }

      function markScroll() {
        lastScrollAt = Date.now();
        markInteraction();
      }

      function isEditingControl() {
        const el = document.activeElement;
        return !!(el?.matches && el.matches("input, textarea, select") && !el.matches("[data-action='metric-select'], [data-country-filter]"));
      }

      function scheduleRender(options = {}) {
        if (pendingRender) return;
        if (!options.force && shouldHoldRender()) {
          clearTimeout(deferredRenderTimer);
          if (!modal) deferredRenderTimer = setTimeout(() => scheduleRender(options), renderIdleDelay());
          return;
        }
        pendingRender = true;
        requestAnimationFrame(() => {
          pendingRender = false;
          render({ preserveScroll: options.preserveScroll !== false && !options.resetScroll, resetScroll: options.resetScroll });
        });
      }

      function shouldHoldRender() {
        if (!state) return false;
        if (modal) return true;
        if (isEditingControl()) return true;
        const now = Date.now();
        if (now - lastScrollAt < 1300) return true;
        if (now - lastInteractionAt < 650 && hasHoveredInteractive()) return true;
        return hasHoveredInteractive();
      }

      function hasHoveredInteractive() {
        try {
          return !!document.querySelector("button:hover, input:hover, textarea:hover, select:hover, [data-action]:hover, [data-tab]:hover, .modal:hover, .scroll:hover, .news-feed:hover");
        } catch {
          return false;
        }
      }

      function renderIdleDelay() {
        const now = Date.now();
        const waitScroll = Math.max(0, 1300 - (now - lastScrollAt));
        const waitInput = isEditingControl() ? 800 : 0;
        const waitHover = hasHoveredInteractive() ? 650 : 0;
        return Math.max(250, waitScroll, waitInput, waitHover);
      }

      function captureScrollState() {
        const scrollables = Array.from(document.querySelectorAll(".nav, .scroll, .news-feed, textarea"));
        return {
          x: window.scrollX || 0,
          y: window.scrollY || 0,
          nodes: scrollables.map((el, index) => ({
            key: el.id || el.dataset.scrollKey || `${el.tagName || "node"}:${el.className || ""}:${index}`,
            top: el.scrollTop || 0,
            left: el.scrollLeft || 0
          }))
        };
      }

      function restoreScrollState(saved) {
        if (!saved) return;
        requestAnimationFrame(() => {
          window.scrollTo?.(saved.x, saved.y);
          const map = new Map(saved.nodes.map(item => [item.key, item]));
          Array.from(document.querySelectorAll(".nav, .scroll, .news-feed, textarea")).forEach((el, index) => {
            const key = el.id || el.dataset.scrollKey || `${el.tagName || "node"}:${el.className || ""}:${index}`;
            const item = map.get(key);
            if (item) {
              el.scrollTop = item.top;
              el.scrollLeft = item.left;
            }
          });
        });
      }

      function render(options = {}) {
        const scrollState = options.preserveScroll && state ? captureScrollState() : null;
        document.body.classList.toggle("light", state?.theme === "light");
        if (!state) {
          app.innerHTML = renderSetup();
          if (options.resetScroll) requestAnimationFrame(() => window.scrollTo?.(0, 0));
          return;
        }
        app.innerHTML = renderGame();
        renderCharts();
        if (options.resetScroll) requestAnimationFrame(() => window.scrollTo?.(0, 0));
        else restoreScrollState(scrollState);
      }

      function renderRegionSvg(region) {
        const centroid = getCentroid(region.points);
        const selected = region.id === selectedRegionId ? "selected" : "";
        return `
          <g>
            <polygon class="region-poly ${selected}" data-action="select-region" data-id="${region.id}" points="${pointsAttr(region.points)}" fill="${esc(region.color)}" opacity=".82"></polygon>
            ${renderRegionRoads(region)}
            ${renderBuildingMarkers(region, centroid)}
            <text class="map-label" x="${centroid.x}" y="${centroid.y}" text-anchor="middle">${esc(region.name)}</text>
          </g>
        `;
      }

      function renderRegionRoads(region) {
        const pts = region.points;
        const c = getCentroid(pts);
        let roads = "";
        for (let i = 0; i < Math.min(region.buildings.roads, pts.length); i++) {
          const p = pts[i % pts.length];
          roads += `<line x1="${c.x}" y1="${c.y}" x2="${p[0]}" y2="${p[1]}" stroke="rgba(255,255,255,.72)" stroke-width="4" stroke-linecap="round"></line>`;
        }
        return roads;
      }

      function renderBuildingMarkers(region, centroid) {
        const markers = [];
        const icons = { cities:"●", airports:"✈", ports:"⚓", bases:"▲", plants:"◆", factories:"■", schools:"S", hospitals:"+", universities:"U", farms:"F", mines:"M", oil:"O", gas:"G" };
        let idx = 0;
        for (const [key] of buildingTypes) {
          const count = region.buildings[key] || 0;
          for (let i = 0; i < Math.min(count, key === "roads" ? 0 : 3); i++) {
            const angle = (idx++ / 16) * Math.PI * 2;
            const x = centroid.x + Math.cos(angle) * (26 + (idx % 3) * 18);
            const y = centroid.y + Math.sin(angle) * (20 + (idx % 4) * 14);
            markers.push(`<g class="build-marker"><circle cx="${x}" cy="${y}" r="11" fill="rgba(5,10,18,.78)" stroke="white" stroke-width="1.5"></circle><text x="${x}" y="${y + 4}" text-anchor="middle" fill="white" font-size="11" font-weight="900">${icons[key] || "•"}</text></g>`);
          }
        }
        return markers.join("");
      }

      function renderDrawingSvg() {
        const points = drawingPoints.map(p => `<circle class="draw-point" cx="${p[0]}" cy="${p[1]}" r="6"></circle>`).join("");
        const line = drawingPoints.length > 1 ? `<polyline points="${pointsAttr(drawingPoints)}" fill="rgba(255,191,71,.18)" stroke="var(--warn)" stroke-width="3" stroke-dasharray="7 6"></polyline>` : "";
        return `<g>${line}${points}</g>`;
      }

      function pointsAttr(points) {
        return points.map(p => `${Number(p[0]).toFixed(1)},${Number(p[1]).toFixed(1)}`).join(" ");
      }

      function getCentroid(points) {
        const sum = points.reduce((a, p) => ({ x: a.x + p[0], y: a.y + p[1] }), { x: 0, y: 0 });
        return { x: sum.x / points.length, y: sum.y / points.length };
      }

      function politicsActionSignal(id) {
        const p = state.politics;
        const e = state.economy;
        const firstParty = p.parties && p.parties[0];
        if (id === "law") {
          const kinds = ["economy", "anticorruption", "social", "security", "regions", "freedoms"];
          const avgChance = kinds.reduce((sum, kind) => sum + calcLawChance(kind), 0) / kinds.length;
          return `средний шанс пакетов ${pct(avgChance, 0)}, коалиция ${pct(p.coalition, 0)}`;
        }
        if (id === "decree") return `рейтинг ${pct(p.popularity, 0)}, оппозиция ${pct(p.opposition, 0)}`;
        if (id === "referendum") return p.referendumCooldown > 0 ? `пауза еще ${Math.round(p.referendumCooldown)} дн., рейтинг ${pct(p.popularity, 0)}` : `можно назначить, рейтинг ${pct(p.popularity, 0)}`;
        if (id === "election") return `рейтинг ${pct(p.popularity, 0)}, коалиция ${pct(p.coalition, 0)}, оппозиция ${pct(p.opposition, 0)}`;
        if (id === "amend") return `суд ${pct(p.constitution.courtIndependence, 0)}, права ${pct(p.constitution.rights, 0)}`;
        if (id === "coalition") return `коалиция ${pct(p.coalition, 0)}, лоббизм ${pct(p.lobbyism, 0)}`;
        if (id === "address") return `рейтинг ${pct(p.popularity, 0)}, доверие СМИ ${pct(state.governance.media.trust, 0)}`;
        if (id === "hearings") return `коррупция ${pct(p.corruption, 0)}, коалиция ${pct(p.coalition, 0)}`;
        if (id === "judicial") return `суд ${pct(p.constitution.courtIndependence, 0)}, коррупция ${pct(p.corruption, 0)}`;
        if (id === "cabinet") return `средняя компетентность министров ${pct(avg(p.ministers, "skill"), 0)}`;
        if (id === "confidence") return `коалиция ${pct(p.coalition, 0)}, риск импичмента ${pct(p.impeachmentRisk, 0)}`;
        if (id === "budgetDeal") return `бюджет ${money(e.budget)}, коалиция ${pct(p.coalition, 0)}`;
        if (id === "oppositionDialogue") return `оппозиция ${pct(p.opposition, 0)}, протесты ${pct(p.protests, 0)}`;
        if (id === "civilService") return `качество услуг ${pct(calcServiceScore(), 0)}, коррупция ${pct(p.corruption, 0)}`;
        if (id === "partyMobilize") return `${firstParty ? firstParty.name + " " + pct(firstParty.support, 0) : "партия власти"}, рейтинг ${pct(p.popularity, 0)}`;
        return "данные обновляются после каждого политического решения";
      }

      function calcLawChance(kind) {
        const p = state.politics;
        const base = p.coalition * .58 + p.popularity * .22 - p.lobbyism * .12 - p.protests * .1;
        const modifier = ({ economy: 4, anticorruption: -3, social: 6, security: 2, regions: 1, freedoms: -6 })[kind] || 0;
        return clamp(base + modifier, 12, 92);
      }

      function countryStatus(c) {
        const bits = [];

        if (c.embargo) bits.push("эмбарго");
        if (!bits.length) bits.push(c.embassy ? "посольство" : "нет посольства");
        return bits.map(b => `<span class="pill">${b}</span>`).join(" ");
      }

      function createWar(country, initiator = "player", game = state) {
        const fronts = ["северное направление", "приграничный коридор", "горный участок", "южный фронт", "воздушно-морская зона"];
        const assessment = calcPreWarAssessment(country, game);
        const controlBase = initiator === "foreign" ? 44 : 52;
        const initialControl = clamp(controlBase + (assessment.ratio - 1) * 18 + rnd(-3, 3), 8, 72);
        const initialInitiative = clamp(assessment.initiative + (initiator === "foreign" ? -8 : 0) + rnd(-4, 4), 1, 99);
        return normalizeWar({
          id: uid("war"),
          enemy: country.name,
          enemyId: country.id,
          intensity: Math.round(rnd(32, 72)),
          fatigue: 0,
          control: Math.round(initialControl),
          supply: Math.round(rnd(58, 74)),
          front: pick(fronts),
          phase: initialInitiative >= 55 ? "инициатива" : initialInitiative <= 35 ? "кризис обороны" : initiator === "foreign" ? "оборона" : "маневренная фаза",
          goal: initiator === "foreign" ? "сдерживание угрозы" : pick(["принуждение к переговорам", "демилитаризация угрозы", "защита союзника", "контроль спорного коридора"]),
          initiative: Math.round(initialInitiative),
          warScore: 0,
          civilianPressure: 0,
          peaceTerms: [],
          days: 0,
          ourLosses: 0,
          enemyLosses: 0
        });
      }

      function normalizeWar(w) {
        const war = w || {};
        return {
          id: war.id || uid("war"),
          enemy: war.enemy || "неизвестный противник",
          enemyId: war.enemyId || "",
          intensity: clamp(num(war.intensity, 45), 0, 100),
          fatigue: clamp(num(war.fatigue, 0), 0, 100),
          control: clamp(num(war.control, 50), 0, 100),
          supply: clamp(num(war.supply, 62), 0, 100),
          front: war.front || "основное направление",
          phase: war.phase || "маневренная фаза",
          goal: war.goal || "политическое урегулирование",
          initiative: clamp(num(war.initiative, 50), 0, 100),
          warScore: clamp(num(war.warScore, 0), -100, 100),
          civilianPressure: clamp(num(war.civilianPressure, 0), 0, 100),
          peaceTerms: Array.isArray(war.peaceTerms) ? war.peaceTerms : [],
          days: Math.max(0, Math.round(num(war.days, 0))),
          ourLosses: Math.max(0, Math.round(num(war.ourLosses, 0))),
          enemyLosses: Math.max(0, Math.round(num(war.enemyLosses, 0)))

      function drawChart(canvas, data, label) {
        const rect = canvas.getBoundingClientRect();
        const ratio = window.devicePixelRatio || 1;
        canvas.width = Math.max(320, Math.floor(rect.width * ratio));
        canvas.height = Math.max(180, Math.floor(rect.height * ratio));
        const ctx = canvas.getContext("2d");
        ctx.setTransform(ratio, 0, 0, ratio, 0, 0);
        const w = rect.width;
        const h = rect.height;
        ctx.clearRect(0, 0, w, h);
        const styles = getComputedStyle(document.body);
        const text = styles.getPropertyValue("--text").trim();
        const muted = styles.getPropertyValue("--muted").trim();
        const accent = styles.getPropertyValue("--accent").trim();
        const accent2 = styles.getPropertyValue("--accent-2").trim();
        ctx.fillStyle = muted;
        ctx.font = "12px Inter, sans-serif";
        ctx.fillText(label, 12, 18);
        const values = data.length ? data : [0];
        const min = Math.min(...values);
        const max = Math.max(...values);
        const span = Math.max(1, max - min);
        const pad = 28;
        ctx.strokeStyle = "rgba(148, 163, 184, .18)";
        ctx.lineWidth = 1;
        for (let i = 0; i < 5; i++) {
          const y = pad + (i / 4) * (h - pad * 1.7);
          ctx.beginPath();
          ctx.moveTo(10, y);
          ctx.lineTo(w - 10, y);
          ctx.stroke();
        }
        const grad = ctx.createLinearGradient(0, 0, w, 0);
        grad.addColorStop(0, accent);
        grad.addColorStop(1, accent2);
        ctx.strokeStyle = grad;
        ctx.lineWidth = 3;
        ctx.beginPath();
        values.forEach((v, i) => {
          const x = 14 + (i / Math.max(1, values.length - 1)) * (w - 28);
          const y = h - pad - ((v - min) / span) * (h - pad * 2);
          if (i === 0) ctx.moveTo(x, y);
          else ctx.lineTo(x, y);
        });
        ctx.stroke();
        ctx.fillStyle = text;
        ctx.font = "700 13px Inter, sans-serif";
        ctx.fillText(String(values[values.length - 1] ?? 0), 12, h - 10);
        ctx.fillStyle = muted;
        ctx.fillText(`min ${min.toFixed(1)} · max ${max.toFixed(1)}`, Math.max(12, w - 190), h - 10);
      }

      function imageToDataUrl(file, options = {}) {
        if (!file) return Promise.resolve("");
        return new Promise(resolve => {
          const reader = new FileReader();
          reader.onload = () => {
            const img = new Image();
            img.onload = () => {
              const canvas = document.createElement("canvas");
              const max = options.max || 720;
              const scale = Math.min(1, max / Math.max(img.width, img.height));
              canvas.width = Math.max(1, Math.round(img.width * scale));
              canvas.height = Math.max(1, Math.round(img.height * scale));
              const ctx = canvas.getContext("2d");
              ctx.drawImage(img, 0, 0, canvas.width, canvas.height);
              resolve(canvas.toDataURL(options.type || "image/png", options.quality ?? .9));
            };
            img.onerror = () => resolve(String(reader.result || ""));
            img.src = String(reader.result || "");
          };
          reader.onerror = () => resolve("");
          reader.readAsDataURL(file);
        });
      }

      async function updateImageUpload(input) {

        if (!url) return notify("Не удалось загрузить изображение.");
