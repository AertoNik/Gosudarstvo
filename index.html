      function tickDay(game) {
        advanceDate(game.date);
        simulateEconomy(game);
        simulatePolitics(game);
        simulatePopulation(game);
        simulateTech(game);
        simulateRegions(game);
        simulateDiplomacy(game);
        simulateMilitary(game);
        simulateGovernance(game);
        if (Math.random() < .18) generateDailyNews(game);
        if (Math.random() < .018) triggerRandomEvent(game);
        if (game.date.day === 1 || game.history.date.length < 6) pushHistory(game);
      }

      function advanceDate(d) {
        const days = [31, isLeap(d.year) ? 29 : 28, 31, 30, 31, 30, 31, 31, 30, 31, 30, 31];
        d.day++;
        if (d.day > days[d.month - 1]) {
          d.day = 1;
          d.month++;
          if (d.month > 12) {
            d.month = 1;
            d.year++;
          }
        }
      }

      function isLeap(year) {
        return year % 4 === 0 && (year % 100 !== 0 || year % 400 === 0);
      }

      function simulateEconomy(game) {
        const e = game.economy;
        const pop = game.population;
        const infra = totalBuildingValue(game, ["roads","ports","airports","plants"]);
        const plants = totalBuildings("plants", game);
        const factories = totalBuildings("factories", game);
        const farms = totalBuildings("farms", game);
        const ports = totalBuildings("ports", game);
        const oil = totalBuildings("oil", game);
        const gas = totalBuildings("gas", game);
        const education = pop.education / 100;
        const taxLoad = (e.taxes.income + e.taxes.vat + e.taxes.corporate + e.taxes.export) / 100;
        const stability = (game.politics.popularity + 100 - game.politics.corruption + pop.happiness) / 300;
        const targetAnnualGrowth = clamp(
          e.growth
          + infra * .035
          + calcProjectEffect(game) * .015
          + (calcServiceScore(game) - 55) * .018
          + (education - .55) * 1.8
          + (stability - .5) * 2.5
          - Math.max(0, taxLoad - .38) * 3.5
          - Math.max(0, e.inflation - 4) * .18
          - game.military.wars.length * 2.5,
          -8,
          10
        );
        const growthDaily = targetAnnualGrowth / 100 / DAYS_PER_YEAR;
        e.gdp = Math.max(1000, e.gdp * (1 + growthDaily));
        const income = calcIncome(game) / 365;
        const expenses = calcExpenses(game) / 365;
        e.budget += income - expenses;
        if (e.budget < -e.gdp * .08) {
          e.debt += Math.abs(e.budget);
          e.budget = 0;
          e.inflation += .08;
          game.politics.popularity -= .04;
        }
        e.debt = Math.max(0, e.debt + Math.max(0, expenses - income) * .18 - Math.max(0, income - expenses) * .05);
        e.reserves = Math.max(0, e.reserves + (e.exports - e.imports) / DAYS_PER_YEAR * .12 - Math.max(0, e.emission) * .006);
        const ratePressure = clamp((e.inflation - e.keyRate) * .00045, -.003, .003);
        const welfarePressure = Math.max(0, e.spending.welfare - 24) * .00022;
        e.inflation = clamp(e.inflation + (e.emission * .000002) + ratePressure + welfarePressure - plants * .00012, -2, 80);
        e.unemployment = clamp(
          e.unemployment
          - e.growth * .00055
          + Math.max(0, e.taxes.corporate - 18) * .00028
          - factories * .00022
          - farms * .0001,
          1,
          45
        );
        e.avgSalary = Math.max(e.minSalary, e.avgSalary * (1 + growthDaily * .55 + (e.inflation / 100) / DAYS_PER_YEAR * .6));
        e.exchangeRate = clamp(e.exchangeRate * (1 + (e.inflation - e.keyRate) / 52000 - (e.reserves / Math.max(1, e.gdp)) * .00018), 0.1, 5000);
        e.exports = Math.max(100, e.exports * (1 + growthDaily * .35 + ports * .00002 + oil * .000025 + gas * .000022));
        e.imports = Math.max(100, e.imports * (1 + pop.life * .0000007 + e.growth * .000003 - farms * .000012));
        e.investments = Math.max(0, e.investments * (1 + growthDaily * .8 + (100 - game.politics.corruption) * .000001 + (e.keyRate < 8 ? .00008 : -.000045)));
        e.smallBusiness = clamp(e.smallBusiness + (e.taxes.corporate < 18 ? .002 : -.001) + (e.unemployment < 7 ? .0008 : -.0008), 0, 100);
        e.bankruptcies = clamp(e.bankruptcies + (e.keyRate > 13 ? .002 : -.001) + (e.growth < 0 ? .004 : -.0008), 0, 30);
        e.growth = clamp(targetAnnualGrowth * .008 + e.growth * .992, -12, 12);
        e.stockIndex = Math.max(100, e.stockIndex * (1 + growthDaily * 3 + (game.politics.popularity - 50) * .00001 - game.military.wars.length * .001));
        e.companies.forEach(c => {
          c.trend = clamp(c.trend * .7 + e.growth * .08 + rnd(-.45, .45) - e.keyRate * .01, -8, 8);
          c.value = Math.max(100, c.value * (1 + c.trend / 3650));
        });
        e.emission *= .995;
      }

      function totalBuildingValue(game, keys) {
        return game.regions.reduce((sum, r) => sum + keys.reduce((a, k) => a + (r.buildings[k] || 0), 0), 0);
      }

      function simulatePolitics(game) {
        const p = game.politics;
        const e = game.economy;
        const pop = game.population;
        const pressure = e.inflation * .09 + e.unemployment * .16 + pop.poverty * .1 + p.corruption * .07 - pop.happiness * .06;
        const aiAdminRelief = game.tech.nodes.find(n => n.id === "ai_admin")?.done ? .02 : 0;
        p.popularity = clamp(p.popularity + e.growth * .001 + (pop.happiness - 50) * .0007 - pressure * .006 + rnd(-.018, .018), 0, 100);
        p.protests = clamp(p.protests + pressure * .004 + p.opposition * .0011 - p.popularity * .0012 + rnd(-.015, .015), 0, 100);
        p.strikes = clamp(p.strikes + e.unemployment * .001 + e.inflation * .0007 - p.popularity * .00075, 0, 100);
        p.opposition = clamp(p.opposition + (50 - p.popularity) * .0008 + p.corruption * .00035, 0, 100);
        p.corruption = clamp(p.corruption + p.lobbyism * .00022 - aiAdminRelief - e.spending.security * .00025 + rnd(-.008, .01), 0, 100);
        p.coalition = clamp(p.coalition + (p.popularity - 50) * .0015 + rnd(-.025, .025), 0, 100);
        p.impeachmentRisk = clamp((p.protests * .22 + p.corruption * .12 + Math.max(0, 45 - p.coalition) * .42 + Math.max(0, 30 - p.popularity) * .5), 0, 100);
        p.electionInDays--;
        if (p.referendumCooldown > 0) p.referendumCooldown--;
        if (p.electionInDays <= 0) runElection(game);
        if (p.impeachmentRisk > 86 && Math.random() < .006) {
          p.popularity = clamp(p.popularity - 8, 0, 100);
          p.coalition = clamp(p.coalition - 12, 0, 100);
          pushNews(game, "Политика", "Процедура импичмента", "Оппозиция инициировала процедуру импичмента. Коалиция требует срочных уступок и публичного антикризисного плана.");
        }
      }

      function simulatePopulation(game) {
        const p = game.population;
        const e = game.economy;
        const dailyBirth = p.total * (p.birthRate / 1000) / 365;
        const dailyDeath = p.total * (p.deathRate / 1000) / 365;
        const migration = p.total * (p.migration / 100) / 365;
        p.total = Math.max(10000, p.total + dailyBirth - dailyDeath + migration);
        p.happiness = clamp(p.happiness + (game.politics.popularity - 50) * .0006 + e.growth * .0012 - e.inflation * .0008 - e.unemployment * .001 - p.crime * .0004 + e.spending.welfare * .0008, 0, 100);
        p.discontent = clamp(100 - p.happiness + e.unemployment * .22 + e.inflation * .18 + game.politics.protests * .2, 0, 100);
        p.crime = clamp(p.crime + p.poverty * .0007 + e.unemployment * .001 - e.spending.security * .0009 - totalBuildings("schools", game) * .00014, 0, 100);
        p.education = clamp(p.education + e.spending.education * .00025 + totalBuildings("universities", game) * .00045 + totalBuildings("schools", game) * .00016, 0, 100);
        p.life = clamp(p.life + e.spending.health * .00028 + totalBuildings("hospitals", game) * .00022 - p.crime * .00015 - e.inflation * .00012, 0, 100);
        p.poverty = clamp(p.poverty + e.unemployment * .001 + e.inflation * .00045 - e.spending.welfare * .00055 - e.growth * .0022, 0, 80);
        p.birthRate = clamp(p.birthRate + (p.happiness - 50) * .00015 - p.poverty * .00008, 3, 28);
        p.deathRate = clamp(p.deathRate - p.life * .000012 + p.poverty * .000012, 3, 30);
      }

      function simulateTech(game) {
        const t = game.tech;
        const focus = t.nodes.find(n => n.id === t.focus && !n.done);
        t.points += (t.labs * .14 + game.economy.spending.science * .025 + totalBuildings("universities", game) * .04) * (game.population.education / 80) * .45;
        if (focus) {
          const locked = focus.requires.some(id => !t.nodes.find(x => x.id === id)?.done);
          if (!locked) {
            focus.progress += (t.labs * .09 + game.economy.spending.science * .018 + game.military.research * .004) * .55;
            if (focus.progress >= focus.cost) completeTech(game, focus);
          }
        }
      }

      function completeTech(game, node) {
        node.done = true;
        node.progress = node.cost;
        if (node.id === "ai_admin") game.politics.corruption = clamp(game.politics.corruption - 4, 0, 100);
        if (node.id === "energy_grid") game.economy.inflation = clamp(game.economy.inflation - .8, -2, 80);
        if (node.id === "bio_medicine") game.population.life = clamp(game.population.life + 4, 0, 100);
        if (node.id === "smart_armor") game.military.readiness = clamp(game.military.readiness + 5, 0, 100);
        if (node.id === "drone_swarms") game.military.cyber = clamp(game.military.cyber + 8, 0, 100);
        pushNews(game, "Открытия", "Технологический прорыв", `Завершено исследование: ${node.name}. ${node.desc}.`);
      }

      function simulateRegions(game) {
        for (const r of game.regions) {
          const infra = Object.entries(r.buildings).reduce((sum, [k, v]) => sum + v * (k === "cities" ? 3 : 1), 0);
          r.wealth = clamp(r.wealth + game.economy.growth * .0015 + infra * .00025 - r.pollution * .00018, 0, 100);
          r.loyalty = clamp(r.loyalty + (game.politics.popularity - 50) * .0008 - game.politics.protests * .00035 + r.budget * .000002, 0, 100);
          r.security = clamp(r.security + game.economy.spending.security * .00035 + r.buildings.bases * .002 - game.population.crime * .00028, 0, 100);
          r.pollution = clamp(r.pollution + r.buildings.factories * .001 + r.buildings.oil * .002 + r.buildings.gas * .001 - r.buildings.plants * .0005, 0, 100);
          r.population = Math.max(1000, r.population + r.population * ((game.population.birthRate - game.population.deathRate) / 1000) / 365 + r.buildings.cities * 5);
        }
      }

      function simulateDiplomacy(game) {
        const e = game.economy;
        game.diplomacy.inbox ||= [];
        for (const offer of game.diplomacy.inbox) offer.daysLeft = Math.max(0, (offer.daysLeft || 0) - 1);
        game.diplomacy.inbox = game.diplomacy.inbox.filter(offer => offer.daysLeft > 0).slice(0, 8);
        for (const c of game.diplomacy.countries) {
          const ai = c.aiMood;
          if (ai === "торговый") c.trade *= 1 + rnd(-.0002, .0009);
          if (ai === "силовой") c.military = clamp(c.military + rnd(-.01, .04), 0, 100);
          if (ai === "реформистский") c.stability = clamp(c.stability + rnd(-.02, .04), 0, 100);
          c.relations = clamp(c.relations + rnd(-.045, .045) + (c.alliance ? .012 : 0) - (c.sanctions ? .035 : 0) - (c.war ? .18 : 0), 0, 100);
          c.gdp = Math.max(100, c.gdp * (1 + rnd(-.00008, .00016)));
          if (!c.war && c.relations < 8 && c.military > 70 && Math.random() < .0005) {
            c.war = true;
            game.military.wars.push(createWar(c, "foreign", game));
            pushNews(game, "Мир", "Военный конфликт", `${c.name} начала вооружённую фазу конфликта. Генштаб переводит силы в режим высокой готовности.`);
          }
        }
        if (game.diplomacy.inbox.length < 6 && Math.random() < .045) spawnForeignInitiative(game);
        const tradeBonus = game.diplomacy.countries.reduce((sum, c) => sum + (c.relations > 60 && !c.sanctions && !c.embargo ? c.trade : 0), 0) * .000001;
        e.exports *= 1 + tradeBonus / 365;
      }

      function simulateMilitary(game) {
        const m = game.military;
        m.readiness = clamp(m.readiness + m.budget * .00025 + m.industry * .00016 + m.training * .00008 - m.wars.length * .009, 0, 100);
        m.morale = clamp(m.morale + (game.politics.popularity - 50) * .00035 - m.wars.length * .018 - m.mobilized * .0000004 - m.warExhaustion * .00018, 0, 100);
        m.industry = clamp(m.industry + game.economy.spending.defense * .00025 + totalBuildings("factories", game) * .00018, 0, 100);
        m.training = clamp(m.training + m.contractShare * .00008 + m.budget * .00014 - m.wars.length * .004, 0, 100);
        m.logistics = clamp(m.logistics + m.industry * .00012 + game.economy.spending.infrastructure * .00008 - m.wars.length * .006, 0, 100);
        m.command = clamp(m.command + m.veterans * .00008 + m.research * .00008, 0, 100);
        m.warExhaustion = clamp(m.warExhaustion + m.wars.length * .018 - m.medical * .00008 - game.politics.popularity * .00004, 0, 100);
        m.wars = (m.wars || []).map(normalizeWar);
        for (const w of [...m.wars]) {
          const enemy = game.diplomacy.countries.find(x => x.id === w.enemyId || x.name === w.enemy);
          const balance = calcWarBalance(game, w);
          w.days++;
          w.initiative = clamp(w.initiative * .86 + balance.initiative * .14, 0, 100);
          w.supply = clamp(w.supply + m.logistics * .00055 + m.industry * .00025 + m.budget * .00016 - w.intensity * .006 - (100 - m.readiness) * .00035, 0, 100);
          const doctrineBonus = m.doctrine === "глубокая операция" ? .035 : m.doctrine === "сетецентрическая война" ? .045 : m.doctrine === "территориальная оборона" ? -.01 : .015;
          const frontDelta = clamp((balance.balance * .0032) + (w.initiative - 50) * .006 + doctrineBonus + rnd(-.08, .08), -.34, .34);
          w.control = clamp(w.control + frontDelta, 0, 100);
          w.warScore = clamp(w.warScore + frontDelta * 2.8 + (w.initiative - 50) * .006, -100, 100);
          w.civilianPressure = clamp(w.civilianPressure + w.intensity * .0012 + Math.max(0, 45 - w.supply) * .001, 0, 100);
          w.fatigue = clamp(w.fatigue + w.intensity * .0024 + (100 - w.supply) * .0011 - m.medical * .00016, 0, 100);
          w.intensity = clamp(w.intensity + rnd(-.04, .05) + (w.phase === "наступление" ? .025 : w.phase === "оборона" ? -.015 : 0), 0, 100);
          const lossBase = Math.max(0, w.intensity * rnd(.35, 1.15));
          w.ourLosses += Math.round(lossBase * clamp(1.26 - w.supply / 150 - m.medical / 260 - frontDelta, .28, 1.85));
          w.enemyLosses += Math.round(lossBase * clamp(.62 + frontDelta + m.artillery / 190 + m.drones / 240 + m.airSuperiority / 260, .25, 1.95));
          game.economy.budget -= w.intensity * 1.05 + (100 - w.supply) * .35;
          game.politics.protests = clamp(game.politics.protests + w.fatigue * .0011 + w.ourLosses * .000002 + m.warExhaustion * .00035, 0, 100);
          if (enemy) enemy.relations = clamp(enemy.relations - .035, 0, 100);
          if (w.control >= 88 || w.warScore >= 72) finishWar(game, w, "victory", "Военная победа", `${w.enemy} принимает условия прекращения боевых действий после потери инициативы.`);
          else if (w.control <= 12 || w.warScore <= -72) finishWar(game, w, "defeat", "Невыгодное перемирие", `Кабинет соглашается на тяжелое перемирие с ${w.enemy}, чтобы остановить потери.`);
          else if ((w.fatigue > 92 || m.warExhaustion > 82) && Math.random() < .006) finishWar(game, w, "ceasefire", "Перемирие", `Стороны конфликта с ${w.enemy} согласовали прекращение огня из-за истощения.`);
        }
      }

      function finishWar(game, war, outcome, title, text) {
        const c = game.diplomacy.countries.find(x => x.id === war.enemyId || x.name === war.enemy);
        const scale = clamp((war.intensity + Math.abs(war.warScore) + war.days * .12) / 100, .35, 2.4);
        const reparations = Math.round((c?.gdp || game.economy.gdp * .12) * .0009 * scale);
        const ourCasualtyPressure = clamp(war.ourLosses / 85000, 0, 8);
        const veteranGain = Math.round(Math.max(0, war.enemyLosses + war.ourLosses * .4) / 9000);
        const treaty = { enemy: war.enemy, outcome, date: formatDate(game.date), reparations, control: Math.round(war.control), score: Math.round(war.warScore) };
        if (c) {
          c.war = false;
          c.relations = clamp(outcome === "victory" ? c.relations + 8 : outcome === "defeat" ? c.relations - 8 : c.relations + 2, 0, 100);
        }
        if (outcome === "victory") {
          game.economy.budget += reparations;
          game.economy.reserves += reparations * .22;
          game.politics.popularity = clamp(game.politics.popularity + 3.8 - ourCasualtyPressure, 0, 100);
          game.politics.coalition = clamp(game.politics.coalition + 2.2, 0, 100);
          game.military.morale = clamp(game.military.morale + 5.5, 0, 100);
          game.military.veterans = clamp(game.military.veterans + veteranGain, 0, 100);
          game.military.warExhaustion = clamp(game.military.warExhaustion - 8, 0, 100);
          game.diplomacy.organizations.forEach(o => o.influence = clamp(o.influence + .15, 0, 100));
          if (c) {
            c.military = clamp(c.military - 8 * scale, 0, 100);
            c.treaties.push("мирный договор: репарации и ограничения вооружений");
          }
          treaty.terms = ["репарации", "ограничение вооружений противника", "рост международного престижа", "ветеранский опыт"];
        } else if (outcome === "defeat") {
          game.economy.budget -= reparations * 1.25;
          game.economy.debt += reparations * 1.45;
          game.economy.stockIndex *= .94;
          game.politics.popularity = clamp(game.politics.popularity - 7.5 - ourCasualtyPressure, 0, 100);
          game.politics.coalition = clamp(game.politics.coalition - 5.5, 0, 100);
          game.politics.opposition = clamp(game.politics.opposition + 5.5, 0, 100);
          game.politics.protests = clamp(game.politics.protests + 5 + ourCasualtyPressure, 0, 100);
          game.military.morale = clamp(game.military.morale - 8, 0, 100);
          game.military.readiness = clamp(game.military.readiness - 4.5, 0, 100);
          game.military.warExhaustion = clamp(game.military.warExhaustion + 14, 0, 100);
          if (c) {
            c.relations = clamp(c.relations - 5, 0, 100);
            c.military = clamp(c.military + 3, 0, 100);
          }
          treaty.terms = ["репарации противнику", "падение рейтинга", "рост долга", "кризис доверия к командованию"];
        } else {
          game.economy.budget -= reparations * .28;
          game.politics.popularity = clamp(game.politics.popularity - 1.6 - ourCasualtyPressure * .35, 0, 100);
          game.politics.protests = clamp(game.politics.protests + 1.4, 0, 100);
          game.military.morale = clamp(game.military.morale - 1.8, 0, 100);
          game.military.warExhaustion = clamp(game.military.warExhaustion - 3, 0, 100);
          if (c) c.treaties.push("перемирие под наблюдением");
          treaty.terms = ["заморозка фронта", "ограниченная политическая цена", "частичное восстановление торговли"];
        }
        game.military.lastWarOutcome = title;
        game.military.warTreaties.unshift(treaty);
        game.military.operations.unshift({ id: uid("op"), name: title, type: "итог войны", date: formatDate(game.date), result: Math.round(war.control), terms: treaty.terms.join(", ") });
        game.military.wars = game.military.wars.filter(x => x.id !== war.id);
        pushNews(game, "Армия", title, `${text} Условия: ${treaty.terms.join(", ")}.`);
      }

      function simulateGovernance(game) {
        const g = game.governance;
        const e = game.economy;
        const p = game.politics;
        const pop = game.population;
        const infra = totalBuildingValue(game, ["roads","ports","airports","plants"]);
        for (const service of g.services) {
          const spend = service.id === "health" ? e.spending.health
            : service.id === "education" ? e.spending.education
            : service.id === "digital" ? (e.spending.science + e.spending.security) / 2
            : e.spending.infrastructure;
          service.capacity = clamp(service.capacity + spend * .00035 + infra * .00005 - service.stress * .00018, 0, 100);
          service.stress = clamp(service.stress + pop.discontent * .00016 + e.inflation * .00018 - spend * .00022 - service.capacity * .00008, 0, 100);
          service.level = clamp(service.level + service.capacity * .00018 - service.stress * .00025 + rnd(-.015, .015), 0, 100);
        }
        for (const sector of g.sectors) {
          const taxDrag = Math.max(0, e.taxes.corporate - 18) * .0003;
          const techBonus = (game.tech.nodes.filter(n => n.done).length / Math.max(1, game.tech.nodes.length)) * .004;
          const investment = e.investments / Math.max(1, e.gdp) * .012;
          sector.output = clamp(sector.output + e.growth * .0007 + investment + techBonus - taxDrag + rnd(-.018, .018), 0, 100);
          sector.export = clamp(sector.export + (e.exports > e.imports ? .004 : -.002) + sector.output * .00005, 0, 100);
          sector.jobs = clamp(sector.jobs + (e.unemployment > 8 ? -.002 : .002) + sector.output * .00002, 0, 60);
        }
        for (const topic of g.agenda) {
          const pressure = topic.id === "prices" ? e.inflation * 4.5
            : topic.id === "jobs" ? e.unemployment * 5.2
            : topic.id === "security" ? pop.crime * 1.1 + game.military.wars.length * 12
            : topic.id === "regions" ? 100 - avg(game.regions, "loyalty")
            : calcCrisisPressure(game) + game.diplomacy.countries.filter(c => c.sanctions || c.war).length * 2;
          topic.trend = clamp((pressure - topic.pressure) * .02 + topic.trend * .8, -3, 3);
          topic.pressure = clamp(topic.pressure * .985 + pressure * .015 + rnd(-.035, .035), 0, 100);
        }
        g.media.trust = clamp(g.media.trust + p.popularity * .00035 - p.corruption * .0003 - g.media.polarization * .00025 + rnd(-.018, .018), 0, 100);
        g.media.polarization = clamp(g.media.polarization + pop.discontent * .00028 + p.opposition * .00018 - g.media.freedom * .00016, 0, 100);
        g.media.freedom = clamp(g.media.freedom - p.corruption * .00008 - g.media.propaganda * .00012 + rnd(-.01, .01), 0, 100);
        g.intelligence.cyberThreat = clamp(g.intelligence.cyberThreat + g.intelligence.foreignNetworks * .00018 - game.military.cyber * .00024 + rnd(-.02, .025), 0, 100);
        g.intelligence.domesticRisk = clamp(g.intelligence.domesticRisk + pop.discontent * .00025 + p.protests * .00035 - g.intelligence.counterIntel * .0002, 0, 100);
        g.intelligence.counterIntel = clamp(g.intelligence.counterIntel + e.spending.security * .00028 + game.military.cyber * .00016 - g.intelligence.foreignNetworks * .00008, 0, 100);
        for (const project of g.projects) {
          if (project.status === "paused" || project.status === "done") continue;
          const funding = project.budget ? project.spent / project.budget : 0;
          const daily = .035 + funding * .055 + calcServiceScore(game) * .00018 - project.risk * .00022;
          project.progress = clamp(project.progress + Math.max(.006, daily), 0, 100);
          project.risk = clamp(project.risk + p.corruption * .00025 + e.inflation * .0002 - p.coalition * .00012 - funding * .015, 0, 100);
          if (project.progress >= 100) completeProject(game, project);
        }
        for (const crisis of g.crises) {
          crisis.days++;
          crisis.severity = clamp(crisis.severity + calcNationalRisk(game) * .00055 - calcGovernanceScore(game) * .00042 + rnd(-.05, .06), 0, 100);
        }
        g.crises = g.crises.filter(c => c.severity > 8 || c.days < 12).slice(0, 8);
        if (calcNationalRisk(game) > 54 && g.crises.length < 5 && Math.random() < .006) spawnGovernanceCrisis(game);
      }

      function completeProject(game, project) {
        project.status = "done";
        project.progress = 100;
        project.risk = clamp(project.risk - 12, 0, 100);
        if (project.effect === "growth") game.economy.growth = clamp(game.economy.growth + .35, -12, 12);
        if (project.effect === "corruption") game.politics.corruption = clamp(game.politics.corruption - 3.2, 0, 100);
        if (project.effect === "life") game.population.life = clamp(game.population.life + 2.4, 0, 100);
        if (project.effect === "inflation") game.economy.inflation = clamp(game.economy.inflation - .55, -2, 80);
        if (project.effect === "happiness") game.population.happiness = clamp(game.population.happiness + 2.1, 0, 100);
        if (project.effect === "security") game.military.readiness = clamp(game.military.readiness + 3.2, 0, 100);
        pushNews(game, "Политика", "Национальный проект завершен", `${project.name}: проект принят правительством и начал давать системный эффект.`);
      }

      function spawnGovernanceCrisis(game) {
        const region = pick(game.regions);
        const templates = [
          ["prices", "Ценовой шок", "Резкий рост цен усиливает давление на домохозяйства."],
          ["logistics", "Логистический сбой", "Поставки между регионами идут с задержками, бизнес требует вмешательства."],
          ["cyber", "Кибератака на инфраструктуру", "Цифровые сервисы и критические системы переведены в усиленный режим защиты."],
          ["regional", "Региональный конфликт элит", "Губернатор и местные группы влияния спорят за бюджетные полномочия."],
          ["media", "Информационный кризис", "Медиа раскручивают конфликт вокруг решений правительства."]
        ];
        const [type, title, desc] = pick(templates);
        game.governance.crises.unshift({ id: uid("crisis"), type, title, severity: Math.round(rnd(32, 68)), days: 0, region: region.name, desc });
        pushNews(game, "Безопасность", title, `${desc} Регион: ${region.name}.`);
      }

      function generateDailyNews(game) {
        const category = pick(newsCategories);
        const region = pick(game.regions);
        const country = pick(game.diplomacy.countries);
        const templates = {
          "Экономика": [`Биржевой индекс закрылся на отметке ${Math.round(game.economy.stockIndex)} пунктов.`, `Бизнес просит пересмотреть ставку ${pct(game.economy.keyRate)}.`],
          "Политика": [`Коалиция удерживает ${pct(game.politics.coalition,0)} голосов в парламенте.`, `Оппозиция требует слушаний по расходам бюджета.`],
          "Армия": [`${game.country.armyName} провели учения в регионе ${region.name}.`, `Военная промышленность оценивается в ${pct(game.military.industry,0)} потенциала.`],
          "Мир": [`${country.name} меняет тон переговоров: отношения ${pct(country.relations,0)}.`, `Дипломаты готовят саммит по торговле и визовому режиму.`],
          "Катастрофы": [`В ${region.name} проверяют готовность служб к паводкам и пожарам.`, `МЧС обновляет карту рисков по инфраструктуре.`],
          "Эпидемии": [`Минздрав усиливает мониторинг сезонных заболеваний.`, `Больницы получают дополнительные резервы лекарств.`],
          "Скандалы": [`Журналисты изучают контракты региональной администрации.`, `Антикоррупционная комиссия открыла внеплановую проверку.`],
          "Выборы": [`До очередных выборов осталось ${game.politics.electionInDays} дней.`, `Партии обновляют региональные штабы.`],
          "Аварии": [`Транспортные службы ${region.name} устраняют сбой на магистрали.`, `Энергетики докладывают о стабильной работе сетей.`],
          "Безопасность": [`${game.country.intelligenceName} предупреждает о росте кибератак.`, `Полиция отчиталась о раскрытии крупной схемы.`],
          "Открытия": [`Учёные представили результаты по направлению "${game.tech.nodes.find(n => n.id === game.tech.focus)?.name || "приоритетная технология"}".`, `Университеты получили новые гранты.`]
        };
        pushNews(game, category, newsTitle(category), pick(templates[category] || templates["Мир"]));
      }

      function newsTitle(category) {
        return ({
          "Экономика": "Рынки реагируют на решения правительства",
          "Политика": "Парламентская повестка меняется",
          "Армия": "Генштаб докладывает президенту",
          "Мир": "Дипломатическая сводка",
          "Катастрофы": "Региональные риски",
          "Эпидемии": "Санитарный мониторинг",
          "Скандалы": "Проверка контрактов",
          "Выборы": "Предвыборная динамика",
          "Аварии": "Инфраструктурный инцидент",
          "Безопасность": "Сводка безопасности",
          "Открытия": "Научная новость"
        })[category] || "Сводка дня";
      }

      function triggerRandomEvent(game) {
        triggerEvent(pick(["natural","economic","scandal","epidemic","unrest","terror","discovery"]), game);
      }

      function triggerEvent(type, game = state) {
        const region = pick(game.regions);
        const e = game.economy;
        const p = game.politics;
        const pop = game.population;
        const data = {
          natural: ["Катастрофы", "Стихийное бедствие", `В регионе ${region.name} произошла чрезвычайная ситуация. Бюджет выделяет средства на восстановление.`, () => { e.budget -= 420; region.loyalty -= 2; pop.happiness -= 1.2; }],
          economic: ["Экономика", "Финансовый кризис", "Кредитный рынок сжимается, растёт риск банкротств и давления на валюту.", () => { e.stockIndex *= .94; e.bankruptcies += 1.1; e.exchangeRate *= 1.025; p.popularity -= 1.4; }],
          scandal: ["Скандалы", "Коррупционный скандал", `Прокуратура проверяет закупки в регионе ${region.name}.`, () => { p.corruption += 2.2; p.popularity -= 1.8; p.protests += 1; }],
          epidemic: ["Эпидемии", "Очаг заболевания", "Минздрав вводит санитарные меры и мобилизует больницы.", () => { pop.happiness -= 1.5; pop.deathRate += .2; e.budget -= 310; }],
          unrest: ["Политика", "Митинги и забастовки", "Профсоюзы требуют повышения зарплат и снижения инфляции.", () => { p.protests += 3.4; p.strikes += 2.6; e.growth -= .18; }],
          terror: ["Безопасность", "Теракт предотвращён частично", `${game.country.intelligenceName} задержала часть группы, но общество требует ответов.`, () => { pop.happiness -= 2; pop.crime += 1.6; p.popularity -= .9; game.military.readiness += 1; }],
          discovery: ["Открытия", "Научный прорыв", "Исследовательский консорциум представил технологию с экспортным потенциалом.", () => { game.tech.points += 55; e.investments += 650; p.popularity += 1.2; }]
        }[type];
        data[3]();
        pushNews(game, data[0], data[1], data[2]);
      }

      function buildInRegion(key) {
        const region = state.regions.find(r => r.id === selectedRegionId);
        const spec = buildingTypes.find(b => b[0] === key);
        if (!region || !spec) return;
        const cost = spec[2];
        if (state.economy.budget < cost) {
          notify("Недостаточно бюджета.");
          return;
        }
        state.economy.budget -= cost;
        region.buildings[key] = (region.buildings[key] || 0) + 1;
        region.budget += cost * .18;
        const effects = spec[3];
        if (effects.gdp) state.economy.gdp += effects.gdp * 100;
        if (effects.population) {
          region.population += effects.population;
          state.population.total += effects.population;
        }
        if (effects.happiness) state.population.happiness = clamp(state.population.happiness + effects.happiness, 0, 100);
        if (effects.education) state.population.education = clamp(state.population.education + effects.education, 0, 100);
        if (effects.research) state.tech.points += effects.research * 10;
        if (effects.exports) state.economy.exports += effects.exports * 1000;
        if (effects.imports) state.economy.imports += effects.imports * 600;
        if (effects.inflation) state.economy.inflation = clamp(state.economy.inflation + effects.inflation, -2, 80);
        if (effects.unemployment) state.economy.unemployment = clamp(state.economy.unemployment + effects.unemployment, 1, 45);
        if (effects.army) state.military.readiness = clamp(state.military.readiness + effects.army, 0, 100);
        if (effects.security) region.security = clamp(region.security + effects.security, 0, 100);
        if (effects.pollution) region.pollution = clamp(region.pollution + effects.pollution, 0, 100);
        pushNews(state, "Экономика", "Инфраструктурный проект", `${spec[1]} построен в регионе ${region.name}. Проект уже отражён в бюджете и статистике.`);
      }

      function updateRegionField(el) {
        const r = state.regions.find(x => x.id === selectedRegionId);
        if (!r) return;
        const key = el.dataset.regionField;
        r[key] = el.type === "number" || el.type === "range" ? num(el.value) : el.value;
      }

      function finishRegion() {
        if (drawingPoints.length < 3) {
          notify("Для региона нужно минимум три точки на карте.");
          return;
        }
        const region = {
          id: uid("region"),
          name: `Новый регион ${state.regions.length + 1}`,
          color: `hsl(${Math.floor(rnd(0, 360))} 58% 52%)`,
          governor: "назначьте губернатора",
          budget: 1200,
          population: 400000,
          loyalty: 50,
          wealth: 42,
          security: 48,
          pollution: 18,
          points: drawingPoints.map(p => [Math.round(p[0]), Math.round(p[1])]),
          buildings: emptyBuildings()
        };
        state.regions.push(region);
        selectedRegionId = region.id;
        drawingPoints = [];
        drawMode = false;
        pushNews(state, "Политика", "Новый регион", `Административная карта обновлена: создан регион ${region.name}.`);
      }

      function policyAction(policy) {
        const e = state.economy, p = state.politics, pop = state.population;
        let report = null;
        const actions = {
          stimulus: () => { e.budget -= 1800; e.growth += .7; e.unemployment -= .35; e.inflation += .25; report = ["Пакет стимулов принят", "Кабинет запускает инвестиции в занятость, инфраструктуру и спрос.", [["Бюджет", "-1.80 млрд", "bad"], ["Рост", "+0.7 п.п.", "good"], ["Инфляция", "+0.25 п.п.", "warn"]]]; pushNews(state, "Экономика", "Пакет стимулов", "Правительство запускает инвестиции в занятость, инфраструктуру и спрос."); },
          anticorruption: () => { e.budget -= 420; p.corruption -= 5; p.popularity += 1.3; p.lobbyism -= 2; report = ["Антикоррупционный рейд проведен", "Проверки ударили по лоббистским группам, но потребовали политического ресурса.", [["Коррупция", "-5 п.п.", "good"], ["Рейтинг", "+1.3 п.п.", "good"], ["Бюджет", "-420 млн", "bad"]]]; pushNews(state, "Скандалы", "Антикоррупционный рейд", "Прокуратура и аудиторы проверяют крупные контракты."); },
          health: () => { e.budget -= 900; pop.life += 2; pop.happiness += 1.5; pop.deathRate -= .12; report = ["Нацпроект медицины запущен", "Больницы получают оборудование, кадры и цифровую маршрутизацию пациентов.", [["Уровень жизни", "+2 п.п.", "good"], ["Счастье", "+1.5 п.п.", "good"], ["Бюджет", "-900 млн", "bad"]]]; pushNews(state, "Политика", "Нацпроект медицины", "Больницы получают оборудование, кадры и цифровую систему маршрутизации."); },
          education: () => { e.budget -= 760; pop.education += 2.8; state.tech.points += 35; report = ["Образовательная реформа одобрена", "Школы и университеты получают новый стандарт финансирования и гранты.", [["Образование", "+2.8 п.п.", "good"], ["Наука", "+35 очков", "good"], ["Бюджет", "-760 млн", "bad"]]]; pushNews(state, "Открытия", "Образовательная реформа", "Школы и университеты получили новый стандарт финансирования."); },
          security: () => { e.budget -= 520; pop.crime -= 2.6; p.protests += .6; state.military.cyber += 1.5; report = ["Безопасность усилена", "Полиция и спецслужбы получают ресурсы, общество внимательно следит за полномочиями силового блока.", [["Преступность", "-2.6 п.п.", "good"], ["Кибер", "+1.5 п.п.", "good"], ["Протесты", "+0.6 п.п.", "warn"]]]; pushNews(state, "Безопасность", "Усиление безопасности", "Полиция и спецслужбы получили дополнительные полномочия и ресурсы."); },
          summit: () => { e.budget -= 280; state.diplomacy.countries.slice(0, 20).forEach(c => c.relations = clamp(c.relations + rnd(.2, 1.2), 0, 100)); report = ["Международный саммит проведен", "Дипломаты открыли переговорные треки с ключевыми партнерами.", [["Первые 20 стран", "+отношения", "good"], ["Бюджет", "-280 млн", "bad"], ["Имидж", "усилен", "good"]]]; pushNews(state, "Мир", "Международный саммит", "Президент принял лидеров, инвесторов и руководителей организаций."); }
        };
        actions[policy]?.();
        normalizeCore();
        if (report) showDecision(report[0], report[1], report[2], "good");
      }

      function governanceAction(type) {
        const g = state.governance, e = state.economy, p = state.politics, pop = state.population;
        let report = null;
        if (type === "briefing") {
          e.budget -= 120;
          g.media.trust += 2.4;
          g.media.polarization -= 1.2;
          g.agenda.forEach(a => a.pressure = clamp(a.pressure - .9, 0, 100));
          report = ["Большой брифинг проведен", "Кабинет публично объяснил решения, риски и календарь реформ.", [["Бюджет", "-120 млн", "bad"], ["Доверие СМИ", "+2.4 п.п.", "good"], ["Давление повестки", "ниже", "good"]], "good"];
          pushNews(state, "Политика", "Большой президентский брифинг", "Кабинет публично объяснил решения, риски и календарь реформ.");
        }
        if (type === "audit") {
          e.budget -= 260;
          p.corruption -= 1.8;
          p.lobbyism -= .9;
          g.projects.forEach(project => project.risk = clamp(project.risk - 1.1, 0, 100));
          report = ["Аудит министерств запущен", "Проверяются закупки, сроки и KPI министров.", [["Бюджет", "-260 млн", "bad"], ["Коррупция", "-1.8 п.п.", "good"], ["Риск проектов", "ниже", "good"]], "good"];
          pushNews(state, "Скандалы", "Аудит министерств", "Счетная палата и администрация проверяют закупки, сроки и KPI министров.");
        }
        if (type === "counterintel") {
          e.budget -= 340;
          g.intelligence.counterIntel += 4.5;
          g.intelligence.cyberThreat -= 2.4;
          g.intelligence.foreignNetworks -= 1.7;
          state.military.cyber += .8;
          report = ["Контрразведка усилена", "Спецслужбы закрывают уязвимости критической инфраструктуры.", [["Бюджет", "-340 млн", "bad"], ["Контрразведка", "+4.5 п.п.", "good"], ["Киберугроза", "-2.4 п.п.", "good"]], "good"];
          pushNews(state, "Безопасность", "Контрразведывательная операция", `${state.country.intelligenceName} усиливает защиту критической инфраструктуры.`);
        }
        if (type === "media") {
          e.budget -= 180;
          g.media.trust += 1.8;
          g.media.propaganda += .8;
          g.media.freedom -= .5;
          p.popularity += .4;
          report = ["Медиастратегия принята", "Правительство синхронизирует коммуникацию реформ и кризисных решений.", [["Бюджет", "-180 млн", "bad"], ["Доверие", "+1.8 п.п.", "good"], ["Свобода прессы", "-0.5 п.п.", "warn"]], "warn"];
          pushNews(state, "Политика", "Медиастратегия", "Правительство запускает единую коммуникацию реформ и кризисных решений.");
        }
        if (type === "emergency") {
          e.budget -= 520;
          pop.happiness += .5;
          g.crises.forEach(c => c.severity = clamp(c.severity - rnd(5, 11), 0, 100));
          g.services.forEach(s => s.stress = clamp(s.stress - 1.4, 0, 100));
          report = ["Штаб реагирования развернут", "Кризисные службы получили единый координационный контур.", [["Бюджет", "-520 млн", "bad"], ["Кризисы", "severity ниже", "good"], ["Нагрузка служб", "-1.4 п.п.", "good"]], "good"];
          pushNews(state, "Безопасность", "Штаб реагирования", "Кризисный штаб синхронизировал регионы, ведомства и инфраструктурные службы.");
        }
        normalizeGovernance();
        normalizeCore();
        if (report) showDecision(report[0], report[1], report[2], report[3]);
      }

      function crisisAction(id, mode) {
        const crisis = state.governance.crises.find(c => c.id === id);
        if (!crisis) return notify("Кризис уже закрыт.", "good", "Кризисный штаб");
        const region = state.regions.find(r => r.name === crisis.region);
        const costs = { funding: 480 + crisis.severity * 6, communication: 130, security: 300, regional: 360 };
        const cost = costs[mode] || 260;
        if (state.economy.budget < cost) return showBlockedDecision("Недостаточно бюджета", "Кризисный штаб не может провести решение без финансирования.", [["Нужно", money(cost), "bad"], ["Бюджет", money(state.economy.budget), "bad"]]);
        const before = crisis.severity;
        state.economy.budget -= cost;
        let title = "Кризисное решение принято";
        let result = "";
        let tone = "good";
        if (mode === "funding") {
          crisis.severity = clamp(crisis.severity - rnd(8, 16), 0, 100);
          state.governance.services.forEach(s => s.stress = clamp(s.stress - .8, 0, 100));
          result = "Целевое финансирование закрывает самые дорогие узкие места кризиса.";
          title = "Финансирование кризиса выделено";
        }
        if (mode === "communication") {
          crisis.severity = clamp(crisis.severity - rnd(4, 9), 0, 100);
          state.governance.media.trust += 1.8;
          state.governance.media.polarization -= .7;
          state.politics.popularity += .3;
          result = "Публичная коммуникация снижает панику и слухи.";
          title = "Кризисная коммуникация проведена";
        }
        if (mode === "security") {
          const cyberBonus = crisis.type === "cyber" ? 4 : 0;
          crisis.severity = clamp(crisis.severity - rnd(6 + cyberBonus, 13 + cyberBonus), 0, 100);
          state.governance.intelligence.domesticRisk -= 1.6;
          state.governance.intelligence.cyberThreat -= crisis.type === "cyber" ? 3.2 : .8;
          state.military.readiness += .5;
          result = "Безопасностный штаб локализует угрозу и защищает критические службы.";
          title = "Штаб безопасности сработал";
        }
        if (mode === "regional") {
          crisis.severity = clamp(crisis.severity - rnd(7, 14), 0, 100);
          if (region) {
            region.loyalty = clamp(region.loyalty + 2.2, 0, 100);
            region.budget += 160;
          }
          state.population.happiness += .4;
          result = "Регион получает управленческую группу, деньги и политический канал связи.";
          title = "Региональная помощь отправлена";
        }
        const closed = crisis.severity <= 8;
        if (closed) {
          state.governance.crises = state.governance.crises.filter(c => c.id !== id);
          result += " Кризис снят с оперативного контроля.";
          tone = "good";
        } else if (crisis.severity > before - 6) {
          tone = "warn";
        }
        normalizeGovernance();
        normalizeCore();
        pushNews(state, "Безопасность", closed ? "Кризис закрыт" : title, `${crisis.title}: severity ${pct(before,0)} → ${pct(crisis.severity,0)}.`);
        showDecision(title, result, [["Severity", `${pct(before,0)} → ${pct(crisis.severity,0)}`, crisis.severity < before ? "good" : "warn"], ["Стоимость", `-${money(cost)}`, "bad"], ["Статус", closed ? "закрыт" : "под контролем", closed ? "good" : "warn"]], tone);
      }

      function projectAction(projectId, mode) {
        const project = state.governance.projects.find(p => p.id === projectId);
        if (!project || project.status === "done") return;
        const e = state.economy;
        if (mode === "pause") {
          project.status = project.status === "paused" ? "active" : "paused";
          pushNews(state, "Политика", "Статус нацпроекта изменен", `${project.name}: ${project.status === "paused" ? "проект поставлен на паузу" : "проект возобновлен"}.`);
          showDecision("Статус проекта изменен", `${project.name}: ${project.status === "paused" ? "проект поставлен на паузу для ревизии бюджета." : "проект возвращен в активную фазу."}`, [["Статус", projectStatus(project), "warn"], ["Прогресс", pct(project.progress,0), "good"], ["Риск", pct(project.risk,0), riskClass(project.risk)]], project.status === "paused" ? "warn" : "good");
          return;
        }
        const cost = mode === "accelerate" ? 760 : 420;
        if (e.budget < cost) return notify("Недостаточно бюджета на проект.");
        e.budget -= cost;
        project.spent = clamp(project.spent + cost, 0, project.budget * 1.25);
        if (mode === "fund") {
          project.progress = clamp(project.progress + rnd(1.2, 2.6), 0, 100);
          project.risk = clamp(project.risk - rnd(.8, 1.9), 0, 100);
        }
        if (mode === "accelerate") {
          project.progress = clamp(project.progress + rnd(2.4, 4.6), 0, 100);
          project.risk = clamp(project.risk + rnd(.6, 1.8), 0, 100);
          state.politics.lobbyism += .2;
        }
        if (project.progress >= 100) completeProject(state, project);
        pushNews(state, "Экономика", "Нацпроект получил решение", `${project.name}: прогресс ${pct(project.progress,0)}, риск ${pct(project.risk,0)}.`);
        normalizeGovernance();
        normalizeCore();
        showDecision(mode === "accelerate" ? "Проект ускорен" : "Проект профинансирован", `${project.name}: решение принято проектным офисом.`, [["Бюджет", `-${money(cost)}`, "bad"], ["Прогресс", pct(project.progress,0), "good"], ["Риск", pct(project.risk,0), riskClass(project.risk)]], mode === "accelerate" && project.risk > 45 ? "warn" : "good");
      }

      function economyAction(type) {
        const e = state.economy;
        let report = null;
        if (type === "emit") { e.emission += 1200; e.budget += 1200; e.inflation += .9; report = ["Эмиссия проведена", "Центробанк расширил денежное предложение. Бюджет получил быстрый ресурс, но инфляционное давление выросло.", [["Бюджет", "+1.20 млрд", "good"], ["Инфляция", "+0.9 п.п.", "bad"], ["Эмиссия", "+1.20 млрд", "warn"]], "warn"]; }

        }

          p.coalition -= .8;
          report = ["Кабинет переформатирован", "Слабые министерства получили новых управленцев. Эффективность растет, но часть коалиции недовольна кадровыми перестановками.", [["Компетентность", "+6-14", "good"], ["Бюджет", "-180 млн", "bad"], ["Коалиция", "-0.8 п.п.", "warn"], ["Рейтинг", "+0.6 п.п.", "good"]], "good"];

        if (type === "confidence") {

        }

        }
        if (type === "oppositionDialogue") {
          state.economy.budget -= 120;
          p.opposition -= 3.4;
          p.protests -= 1.8;

          report = ["Диалог с оппозицией начат", "Администрация открывает парламентскую площадку для спорных вопросов. Улица успокаивается, но жесткое ядро коалиции ворчит.", [["Оппозиция", "-3.4 п.п.", "good"], ["Протесты", "-1.8 п.п.", "good"], ["Коалиция", "-0.6 п.п.", "warn"], ["Доверие СМИ", "+1.1 п.п.", "good"]], "good"];

        }

          p.coalition += 1.4;

          if (p.parties[0]) {
            p.parties[0].support = clamp(p.parties[0].support + 1.8, 0, 100);
            p.parties[0].seats = Math.round(p.parliamentSeats * p.parties[0].support / 100);
          }
          report = ["Партия мобилизована", "Региональные штабы запускают кампанию поддержки реформ. Ядро сторонников активнее, оппозиция отвечает контркампанией.", [["Рейтинг", "+1.2 п.п.", "good"], ["Коалиция", "+1.4 п.п.", "good"], ["Оппозиция", "+0.6 п.п.", "warn"], ["Бюджет", "-150 млн", "bad"]], "good"];
        }
        normalizeCore();
        pushNews(state, "Политика", "Политическое решение", "Баланс партий, коалиции и общественной поддержки изменился.");
