      function lawPackageAction(kind) {
        const p = state.politics, e = state.economy, pop = state.population, g = state.governance;
        const packages = {
          economy: { name: "Закон о промышленном росте", effect: "льготы для производств, быстрые закупки, экспортные гарантии", cost: 720 },
          anticorruption: { name: "Закон о чистых закупках", effect: "открытые реестры, аудит контрактов, защита суда", cost: 360 },
          social: { name: "Закон о доходах граждан", effect: "адресная помощь, индексация пенсий, программы занятости", cost: 840 },
          security: { name: "Закон о безопасности инфраструктуры", effect: "контртеррор, киберзащита, защита транспорта и энергетики", cost: 520 },
          regions: { name: "Закон о региональном балансе", effect: "субсидии регионам, полномочия губернаторов, инфраструктурные KPI", cost: 640 },
          freedoms: { name: "Закон о правах и парламентском контроле", effect: "судебные гарантии, свобода прессы, контроль силовых полномочий", cost: 280 }
        };
        const pack = packages[kind] || packages.economy;
        if (e.budget < pack.cost) return showBlockedDecision("Недостаточно бюджета", `${pack.name} требует ${money(pack.cost)} на внедрение.`, [["Бюджет", money(e.budget), "bad"], ["Нужно", money(pack.cost), "bad"]]);
        const chance = calcLawChance(kind);
        const roll = rnd(0, 100);
        const passed = roll <= chance;
        e.budget -= pack.cost;
        const support = Math.round(clamp(chance + rnd(-8, 8), 20, 95));
        const law = { name: pack.name, effect: pack.effect, support, passed, date: formatDate(state.date) };
        p.laws.unshift(law);
        let details = [["Шанс", pct(chance,0), chance >= 55 ? "good" : "warn"], ["Голосование", pct(roll,0), passed ? "good" : "bad"], ["Бюджет", `-${money(pack.cost)}`, "bad"]];
        let result = "";
        let tone = passed ? "good" : "bad";
        if (passed) {
          p.coalition = clamp(p.coalition + (kind === "social" ? 1.2 : kind === "security" ? .6 : .9), 0, 100);
          p.popularity = clamp(p.popularity + (kind === "social" ? 1.8 : kind === "economy" ? .8 : kind === "freedoms" ? 1.1 : .5), 0, 100);
          if (kind === "economy") { e.growth += .28; e.investments += 420; e.unemployment -= .18; }
          if (kind === "anticorruption") { p.corruption -= 2.2; p.lobbyism -= 1.4; g.projects.forEach(x => x.risk = clamp(x.risk - .8, 0, 100)); }
          if (kind === "social") { pop.happiness += 1.4; pop.poverty -= .9; p.protests -= 1.2; }
          if (kind === "security") { pop.crime -= 1.4; g.intelligence.cyberThreat -= 1.6; state.military.readiness += .7; p.protests += .3; }
          if (kind === "regions") { state.regions.forEach(r => { r.loyalty = clamp(r.loyalty + 1.3, 0, 100); r.budget += 90; }); p.coalition += .8; }
          if (kind === "freedoms") { p.constitution.rights += 2.2; p.constitution.courtIndependence += 1.3; g.media.trust += 1.5; g.media.freedom += 1.2; p.coalition -= .8; }
          result = `${pack.name} принят. ${pack.effect}.`;
          details.push(["Коалиция", pct(p.coalition,0), p.coalition >= 50 ? "good" : "warn"]);
        } else {
          p.coalition = clamp(p.coalition - 2.4, 0, 100);
          p.opposition = clamp(p.opposition + 1.8, 0, 100);
          p.lobbyism = clamp(p.lobbyism + (kind === "anticorruption" ? 1.4 : .5), 0, 100);
          p.popularity = clamp(p.popularity - .9, 0, 100);
          result = `${pack.name} не прошел комитеты. Оппозиция получила повод атаковать кабинет, а коалиции нужен новый раунд переговоров.`;
          details.push(["Коалиция", "-2.4 п.п.", "bad"], ["Оппозиция", "+1.8 п.п.", "bad"]);
        }
        normalizeCore();
        pushNews(state, "Политика", passed ? "Закон принят" : "Закон провален", result);
        showDecision(passed ? "Закон принят" : "Закон не прошел", result, details, tone);
      }

      function runElection(game, early = false) {
        const p = game.politics;
        const result = clamp(p.popularity + game.economy.growth * 2 - p.corruption * .12 - p.protests * .2 + rnd(-12, 12), 0, 100);
        const won = result >= 45;
        p.electionInDays = 1825;
        p.popularity = clamp(result + (won ? 4 : -6), 0, 100);
        p.coalition = clamp(result + rnd(-8, 10), 0, 100);
        p.opposition = clamp(100 - result + rnd(-7, 7), 0, 100);
        p.parties[0].support = clamp(result, 5, 70);
        p.parties[0].seats = Math.round(p.parliamentSeats * p.parties[0].support / 100);
        pushNews(game, "Выборы", won ? "Президентская партия побеждает" : "Правящая партия теряет большинство", `${early ? "Досрочные выборы" : "Очередные выборы"} завершены с результатом ${pct(result,0)}.`);
        return { result, won };
      }

      function replaceMinister(index) {
        const names = ["Наталья Руднева","Максим Фомин","Сергей Вальд","Диана Яровая","Артур Ланской","Кира Светлова","Михаил Климов","Инга Ларина"];
        const m = state.politics.ministers[index];
        if (!m) return;
        m.name = pick(names);
        m.skill = Math.round(rnd(50, 88));
        m.loyalty = Math.round(rnd(45, 86));
        state.politics.popularity -= .4;
        pushNews(state, "Политика", "Кадровое решение", `${m.post}: назначен новый руководитель ${m.name}.`);
      }

      function diplomacyAction(type) {
        const c = state.diplomacy.countries.find(x => x.id === selectedCountryId);
        if (!c) return;
        const e = state.economy;
        let report = null;
        if (type === "relations") {
          const gain = rnd(4, 10);
          e.budget -= 90; c.relations += gain; c.embassy = true;
          report = ["Переговоры проведены", `Посольство и МИД открыли рабочий канал с ${c.name}.`, [["Отношения", `+${gain.toFixed(1)} п.п.`, "good"], ["Бюджет", "-90 млн", "bad"], ["Посольство", "открыто", "good"]], "good"];
        }
        if (type === "trade") {
          const tradeGain = rnd(600, 2200);
          e.budget -= 160; c.trade += tradeGain; c.treaties.push("торговый контракт"); c.relations += 3;
          report = ["Торговый контракт подписан", `${c.name} расширяет закупки и логистические каналы.`, [["Торговля", `+${money(tradeGain)}`, "good"], ["Отношения", "+3 п.п.", "good"], ["Бюджет", "-160 млн", "bad"]], "good"];
        }
        if (type === "alliance") {
          const chance = clamp(c.relations + c.stability * .2 - c.spy * .12 - (c.sanctions ? 25 : 0) - (c.embargo ? 18 : 0), 0, 100);
          if (c.relations < 60 || chance < 58) {
            showBlockedDecision("Союз не подписан", `${c.name} не готова к союзному договору. Нужны отношения выше 60%, стабильность и отсутствие жестких ограничений.`, [["Отношения", pct(c.relations,0), c.relations >= 60 ? "good" : "bad"], ["Шанс", pct(chance,0), "warn"], ["Статус", c.sanctions || c.embargo ? "ограничения" : "переговоры", "warn"]]);
            return;
          }
          c.alliance = true; c.treaties.push("союз"); c.relations += 5;
          report = ["Союз подписан", `${state.country.name} и ${c.name} создают политико-военный контур координации.`, [["Отношения", "+5 п.п.", "good"], ["Союз", "активен", "good"], ["Риск войны", "ниже", "good"]], "good"];
        }
        if (type === "sanctions") {
          c.sanctions = !c.sanctions; c.relations += c.sanctions ? -12 : 6; e.exports -= c.sanctions ? c.trade * .04 : -c.trade * .02;
          report = [c.sanctions ? "Санкции введены" : "Санкции сняты", c.sanctions ? `Ограничения ударят по отношениям с ${c.name}, но покажут жесткую позицию.` : `Дипломаты открывают окно для восстановления торговли с ${c.name}.`, [["Отношения", c.sanctions ? "-12 п.п." : "+6 п.п.", c.sanctions ? "bad" : "good"], ["Экспорт", c.sanctions ? "снижен" : "частично восстановлен", c.sanctions ? "bad" : "good"]], c.sanctions ? "warn" : "good"];
        }
        if (type === "embargo") {
          c.embargo = !c.embargo; c.relations += c.embargo ? -16 : 5; c.trade *= c.embargo ? .62 : 1.18;
          report = [c.embargo ? "Эмбарго введено" : "Эмбарго отменено", c.embargo ? "Торговля резко ограничена, бизнес готовит компенсационные маршруты." : "Торговля начинает восстанавливаться.", [["Торговля", c.embargo ? "-38%" : "+18%", c.embargo ? "bad" : "good"], ["Отношения", c.embargo ? "-16 п.п." : "+5 п.п.", c.embargo ? "bad" : "good"]], c.embargo ? "bad" : "good"];
        }
        if (type === "milAid") {
          e.budget -= 540; c.relations += 8; c.military += 2; c.aid += 540;
          report = ["Военная помощь отправлена", `${c.name} получает помощь, союзники воспринимают это как сигнал готовности к обязательствам.`, [["Бюджет", "-540 млн", "bad"], ["Отношения", "+8 п.п.", "good"], ["Армия партнера", "+2 п.п.", "good"]], "good"];
        }
        if (type === "humanAid") {
          e.budget -= 220; c.relations += 6; c.stability += 3; c.aid += 220;
          report = ["Гуманитарная помощь отправлена", "Поставка медикаментов и продовольствия улучшила гуманитарный фон переговоров.", [["Бюджет", "-220 млн", "bad"], ["Отношения", "+6 п.п.", "good"], ["Стабильность", "+3 п.п.", "good"]], "good"];
        }
        if (type === "spy") {
          const gain = rnd(4, 10);
          e.budget -= 120; c.spy += gain; c.relations -= rnd(0, 2); state.military.cyber += .4;
          report = ["Разведоперация проведена", `${state.country.intelligenceName} расширяет сеть источников. Риск дипломатической утечки сохраняется.`, [["Разведка", `+${gain.toFixed(1)} п.п.`, "good"], ["Кибер", "+0.4 п.п.", "good"], ["Отношения", "слегка ниже", "warn"]], "warn"];
        }
        if (type === "visa") {
          c.visa = c.visa === "свободный" ? "строгий" : c.visa === "строгий" ? "обычный" : "свободный"; c.relations += c.visa === "свободный" ? 3 : -2;
          report = ["Визовый режим изменен", `Новый режим: ${c.visa}. Это влияет на туризм, бизнес и тон переговоров.`, [["Визы", c.visa, "warn"], ["Отношения", c.visa === "свободный" ? "+3 п.п." : "-2 п.п.", c.visa === "свободный" ? "good" : "warn"]], "warn"];
        }
        if (type === "war") {
          showWarAssessment(c);
          return;
        }
        if (type === "peace") {
          c.war = false; c.relations += 8; state.military.wars = state.military.wars.filter(w => w.enemy !== c.name);
          report = ["Перемирие согласовано", `Стороны конфликта с ${c.name} открывают канал прекращения огня.`, [["Отношения", "+8 п.п.", "good"], ["Война", "остановлена", "good"], ["Риск", "ниже", "good"]], "good"];
        }
        c.relations = clamp(c.relations, 0, 100);
        c.military = clamp(c.military, 0, 100);
        c.stability = clamp(c.stability, 0, 100);
        pushNews(state, "Мир", "Дипломатическое решение", `Отношения с ${c.name} теперь ${pct(c.relations,0)}. Статус: ${stripHtml(countryStatus(c))}.`);
        if (report) showDecision(report[0], report[1], report[2], report[3]);
      }

      function showWarAssessment(country) {
        const a = calcPreWarAssessment(country);
        const warning = a.risk === "catastrophic"
          ? "Разведка считает войну крайне невыгодной: противник имеет стратегическую глубину, экономику и военную мощь, которые нельзя компенсировать одним фронтовым решением."
          : a.risk === "danger"
            ? "Противник сильнее. Нужны союзники, санкционное давление, модернизация армии, логистика и экономика военного времени."
            : a.risk === "parity"
              ? "Силы близки. Исход решат снабжение, инициатива, разведка, мораль и политическая устойчивость."
              : "Разведка видит наш перевес, но война все равно ударит по бюджету, рынкам и обществу.";
        modal = {
          title: `Предвоенная оценка: ${country.name}`,
          tone: a.tone,
          body: `
            <div class="decision-brief">
              <div class="decision-banner ${a.tone}">
                <strong>${esc(warning)}</strong>
                <span class="subtle">${dateLabel(state.date)} · ${esc(state.country.capital)} · Генштаб и МИД</span>
              </div>
              <div class="decision-grid">
                <div class="kpi"><span>Наша мощь</span><strong>${powerIndex(a.ownPower)}</strong></div>
                <div class="kpi"><span>Мощь противника</span><strong>${powerIndex(a.enemyPower)}</strong></div>
                <div class="kpi"><span>Соотношение</span><strong class="delta ${a.tone}">${a.ratio.toFixed(2)} : 1</strong></div>
                <div class="kpi"><span>Инициатива в начале</span><strong class="delta ${a.tone}">${pct(a.initiative,0)}</strong></div>
                <div class="kpi"><span>Шанс успеха кампании</span><strong class="delta ${a.tone}">${pct(a.victoryChance,0)}</strong></div>
                <div class="kpi"><span>Прогноз</span><strong class="delta ${a.tone}">${esc(a.label)}</strong></div>
              </div>
              <p class="subtle" style="margin:0;">Перед войной лучше проверить: союзников, санкции против цели, модернизацию армии, БПЛА/разведку, логистику, мобрезерв, бюджет и устойчивость политики.</p>
              <div class="actions">
                <button class="danger" data-action="confirm-war" data-country="${country.id}">${a.risk === "catastrophic" ? "Начать войну вопреки оценке" : "Подтвердить войну"}</button>
                <button data-action="close-modal">Отмена</button>
              </div>
            </div>
          `
        };
        render({ force: true, preserveScroll: true });
      }

      function confirmWar(countryId) {
        const c = state.diplomacy.countries.find(x => x.id === countryId);
        if (!c) return;
        const a = calcPreWarAssessment(c);
        declareWar(c);
        showDecision("Военный конфликт объявлен", `${state.country.armyName} переводятся в режим операции против ${c.name}. Разведка оценивает стартовое соотношение как ${a.ratio.toFixed(2)} : 1 (${a.label}).`, [["Наша мощь", powerIndex(a.ownPower), a.ratio >= 1 ? "good" : "warn"], ["Противник", powerIndex(a.enemyPower), a.ratio >= 1 ? "warn" : "bad"], ["Инициатива", pct(a.initiative,0), a.initiative >= 50 ? "good" : "bad"], ["Биржа", "-7%", "bad"], ["Рейтинг", "-4 п.п.", "bad"]], a.tone);
      }

      function spawnForeignInitiative(game = state, manual = false) {
        game.diplomacy.inbox ||= [];
        const candidates = game.diplomacy.countries.filter(c => !c.war);
        if (!candidates.length) return false;
        const c = pick(candidates);
        const possible = [];
        possible.push(["trade", "Предложение о торговле", `${c.name} предлагает расширить поставки и открыть быстрый таможенный коридор.`]);
        possible.push(["summit", "Запрос на саммит", `${c.name} хочет провести встречу лидеров по безопасности и инвестициям.`]);
        possible.push(["aid", "Просьба о помощи", `${c.name} просит гуманитарный пакет для стабилизации внутренней ситуации.`]);
        if (c.relations > 58) possible.push(["pact", "Пакт о безопасности", `${c.name} предлагает формат консультаций и совместных штабных учений.`]);
        if (c.relations < 35) possible.push(["pressure", "Дипломатическое давление", `${c.name} требует уступок и угрожает ограничениями.`]);
        if (c.relations < 22 && c.military > 62) possible.push(["border", "Пограничная напряженность", `${c.name} стягивает силы и предлагает срочные переговоры.`]);
        const [type, title, text] = pick(possible);
        const offer = { id: uid("offer"), countryId: c.id, countryName: c.name, type, title, text, daysLeft: Math.round(rnd(35, 110)) };
        game.diplomacy.inbox.unshift(offer);
        game.diplomacy.inbox = game.diplomacy.inbox.slice(0, 8);
        pushNews(game, "Мир", title, text);
        if (manual) showDecision("Сводка МИД", `${c.name}: ${text}`, [["Тип", title, "warn"], ["Срок ответа", `${offer.daysLeft} дней`, "good"], ["Отношения", pct(c.relations,0), c.relations > 50 ? "good" : "warn"]], "good");
        return true;
      }

      function foreignOfferAction(id, choice) {
        const inbox = state.diplomacy.inbox || [];
        const offer = inbox.find(x => x.id === id);
        if (!offer) return notify("Инициатива уже устарела.", "warn", "МИД");
        const c = state.diplomacy.countries.find(x => x.id === offer.countryId);
        if (!c) {
          state.diplomacy.inbox = inbox.filter(x => x.id !== id);
          return;
        }
        const accept = choice === "accept";
        let title = accept ? "Инициатива принята" : "Инициатива отклонена";
        let result = "";
        let details = [];
        let tone = accept ? "good" : "warn";
        if (offer.type === "trade") {
          if (accept) { state.economy.budget -= 140; c.trade += rnd(600, 1800); c.relations += 4.5; result = `${c.name} получает расширенный торговый коридор.`; details = [["Бюджет", "-140 млн", "bad"], ["Торговля", "выше", "good"], ["Отношения", "+4.5 п.п.", "good"]]; }
          else { c.relations -= 1.6; result = "МИД оставил предложение без развития."; details = [["Отношения", "-1.6 п.п.", "warn"], ["Торговля", "без изменений", "warn"]]; }
        }
        if (offer.type === "summit") {
          if (accept) { state.economy.budget -= 180; c.relations += 6; state.governance.media.trust += .7; result = `Саммит с ${c.name} создает окно для новых договоренностей.`; details = [["Бюджет", "-180 млн", "bad"], ["Отношения", "+6 п.п.", "good"], ["Медиа", "+0.7 п.п.", "good"]]; }
          else { c.relations -= 2; result = `${c.name} воспринимает отказ как холодный сигнал.`; details = [["Отношения", "-2 п.п.", "warn"]]; }
        }
        if (offer.type === "aid") {
          if (accept) { state.economy.budget -= 320; c.relations += 7; c.stability += 3.5; c.aid += 320; result = "Гуманитарный пакет укрепил доверие и стабилизировал партнера."; details = [["Бюджет", "-320 млн", "bad"], ["Отношения", "+7 п.п.", "good"], ["Стабильность", "+3.5 п.п.", "good"]]; }
          else { c.relations -= 3.2; c.stability -= 1.4; result = "Партнер начинает искать помощь у конкурентов."; details = [["Отношения", "-3.2 п.п.", "warn"], ["Стабильность", "-1.4 п.п.", "bad"]]; }
        }
        if (offer.type === "pact") {
          if (accept) { state.economy.budget -= 260; c.relations += 5; c.treaties.push("пакт безопасности"); state.military.readiness += 1.2; result = "Пакт о безопасности повышает координацию штабов."; details = [["Бюджет", "-260 млн", "bad"], ["Боеготовность", "+1.2 п.п.", "good"], ["Отношения", "+5 п.п.", "good"]]; }
          else { c.relations -= 2.4; result = "Партнер откладывает военное сотрудничество."; details = [["Отношения", "-2.4 п.п.", "warn"]]; }
        }
        if (offer.type === "pressure") {
          if (accept) { c.relations += 4; state.politics.popularity -= .8; state.economy.exports *= .995; result = "Кабинет делает ограниченные уступки, снижая риск санкций."; details = [["Отношения", "+4 п.п.", "good"], ["Рейтинг", "-0.8 п.п.", "warn"], ["Экспорт", "слегка ниже", "warn"]]; tone = "warn"; }
          else { c.sanctions = true; c.relations -= 7; state.economy.exports *= .99; result = `${c.name} вводит ограничительные меры.`; details = [["Санкции", "введены", "bad"], ["Отношения", "-7 п.п.", "bad"], ["Экспорт", "ниже", "bad"]]; tone = "bad"; }
        }
        if (offer.type === "border") {
          if (accept) { state.economy.budget -= 240; c.relations += 2.5; state.military.readiness += 1.4; result = "Срочные переговоры и демонстрация готовности снижают риск эскалации."; details = [["Бюджет", "-240 млн", "bad"], ["Боеготовность", "+1.4 п.п.", "good"], ["Отношения", "+2.5 п.п.", "good"]]; tone = "warn"; }
          else { c.relations -= 8; state.military.readiness += 2.4; result = "Отказ усиливает пограничный кризис."; details = [["Отношения", "-8 п.п.", "bad"], ["Боеготовность", "+2.4 п.п.", "warn"]]; tone = "bad"; if (c.relations < 12 && Math.random() < .35) { c.war = true; state.military.wars.push(createWar(c, "foreign")); result += " Конфликт переходит в вооруженную фазу."; } }
        }
        c.relations = clamp(c.relations, 0, 100);
        c.stability = clamp(c.stability, 0, 100);
        state.diplomacy.inbox = inbox.filter(x => x.id !== id);
        normalizeGovernance();
        normalizeCore();
        pushNews(state, "Мир", title, `${offer.countryName}: ${result}`);
        showDecision(title, result, details, tone);
      }

      function stripHtml(html) {
        const div = document.createElement("div");
        div.innerHTML = html;
        return div.textContent || "";
      }

      function declareWar(c) {
        if (c.war) return;
        c.war = true;
        c.relations = Math.min(c.relations, 2);
        state.military.wars.push(createWar(c, "player"));
        state.politics.popularity = clamp(state.politics.popularity - 4, 0, 100);
        state.economy.stockIndex *= .93;
      }

      function createOrganization() {
        const name = document.getElementById("newOrgName")?.value.trim();
        const purpose = document.getElementById("newOrgPurpose")?.value.trim();
        if (!name) return notify("Введите название организации.");
        state.diplomacy.organizations.push({ id: uid("org"), name, purpose: purpose || "координация политики", members: 1, influence: 24, custom: true });
        pushNews(state, "Мир", "Создана международная организация", `${state.country.name} объявляет о запуске организации "${name}".`);
      }

      function militaryAction(type) {
        const m = state.military, e = state.economy;
        let report = null;
        if (type === "mobilize") { const cost = 900; if (e.budget < cost) return showBlockedDecision("Недостаточно бюджета", "Мобилизация требует финансирования резервов и снабжения.", [["Нужно", money(cost), "bad"]]); m.mobilized += 45000; m.land += 18000; m.readiness += 3; m.morale -= 2; m.warExhaustion += 1.8; e.budget -= cost; state.politics.protests += 1.5; report = ["Мобилизация объявлена", "Резервисты усиливают сухопутные войска, но общество чувствует нагрузку войны.", [["Личный состав", "+18 тыс.", "good"], ["Боеготовность", "+3 п.п.", "good"], ["Протесты", "+1.5 п.п.", "warn"], ["Бюджет", "-900 млн", "bad"]], "warn"]; }
        if (type === "contract") { const cost = 620; if (e.budget < cost) return showBlockedDecision("Недостаточно бюджета", "Контрактная армия требует постоянных выплат.", [["Нужно", money(cost), "bad"]]); m.land += 6500; m.special += 700; m.contractShare += 1.2; m.training += .9; e.budget -= cost; report = ["Контрактники набраны", "Профессиональная доля армии растет, повышая качество подразделений.", [["Личный состав", "+6.5 тыс.", "good"], ["Спецназ", "+700", "good"], ["Подготовка", "+0.9 п.п.", "good"], ["Бюджет", "-620 млн", "bad"]], "good"]; }
        if (type === "draft") { m.conscription = !m.conscription; m.manpower += m.conscription ? 45000 : -30000; state.politics.popularity += m.conscription ? -1.5 : 1.2; m.training += m.conscription ? -.4 : .3; report = [m.conscription ? "Призыв усилен" : "Призыв смягчен", m.conscription ? "Мобилизационный ресурс растет, но рейтинг получает удар." : "Общество воспринимает смягчение призыва позитивно, но резерв сокращается.", [["Мобрезерв", m.conscription ? "+45 тыс." : "-30 тыс.", m.conscription ? "good" : "warn"], ["Рейтинг", m.conscription ? "-1.5 п.п." : "+1.2 п.п.", m.conscription ? "bad" : "good"]], m.conscription ? "warn" : "good"]; }
        if (type === "industry") { const cost = 1100; if (e.budget < cost) return showBlockedDecision("Недостаточно бюджета", "Заказ ВПК требует авансов промышленности.", [["Нужно", money(cost), "bad"]]); m.industry += 4; m.air += 8; m.airDefense += 3; m.artillery += 1.4; e.budget -= cost; report = ["Заказ ВПК размещен", "Промышленность ускоряет поставки авиации, ПВО и артиллерийских систем.", [["ВПК", "+4 п.п.", "good"], ["Авиация", "+8", "good"], ["ПВО", "+3", "good"], ["Бюджет", "-1.10 млрд", "bad"]], "good"]; }
        if (type === "cyber") { const cost = 260; if (e.budget < cost) return showBlockedDecision("Недостаточно бюджета", "Киберучения требуют финансирования инфраструктуры.", [["Нужно", money(cost), "bad"]]); m.cyber += 4; m.recon += 1.2; e.budget -= cost; report = ["Киберучения проведены", "Штабы отрабатывают защиту связи, разведку и точные операции.", [["Кибер", "+4 п.п.", "good"], ["Разведка", "+1.2 п.п.", "good"], ["Бюджет", "-260 млн", "bad"]], "good"]; }
        if (type === "operation") { const cost = 180; if (e.budget < cost) return showBlockedDecision("Недостаточно бюджета", "Учения требуют топлива, боеприпасов и командной подготовки.", [["Нужно", money(cost), "bad"]]); const result = Math.round(rnd(48, 92)); m.operations.unshift({ id: uid("op"), name: pick(["Щит столицы","Северный дозор","Киберпериметр","Морской рубеж"]), type: pick(["учения","разведка","контртеррор","операция"]), date: formatDate(state.date), result }); m.readiness += 1.4; m.command += .7; e.budget -= cost; report = ["Учения проведены", `Результат штабной оценки: ${pct(result,0)}.`, [["Боеготовность", "+1.4 п.п.", "good"], ["Командование", "+0.7 п.п.", "good"], ["Бюджет", "-180 млн", "bad"]], "good"]; }
        normalizeCore();
        pushNews(state, "Армия", "Решение Генштаба", "Военные показатели, бюджет и общественная реакция обновлены.");
        if (report) showDecision(report[0], report[1], report[2], report[3]);
      }

      function militaryUpgrade(key) {
        const meta = {
          drones: ["БПЛА и РЭБ", 540, "Дроны повышают разведку, точные удары и снижают потери."],
          artillery: ["Артиллерия", 680, "Огневая мощь повышает шансы наступления и давление на фронте."],
          armor: ["Бронетехника", 760, "Бронетехника помогает прорывам и защите личного состава."],
          airSuperiority: ["Авиация", 920, "Господство в воздухе улучшает инициативу и снижает потери."],
          medical: ["Военная медицина", 360, "Эвакуация и медицина снижают усталость и политическую цену потерь."],
          navalPower: ["Флот", 700, "Флот защищает морские коммуникации и побережье."]
        }[key];
        if (!meta) return;
        const [title, baseCost, desc] = meta;
        const current = clamp(state.military[key] || 0, 0, 100);
        const cost = Math.round(baseCost * (1 + current / 140));
        if (state.economy.budget < cost) return showBlockedDecision("Недостаточно бюджета", `${title}: модернизация требует ${money(cost)}.`, [["Бюджет", money(state.economy.budget), "bad"], ["Нужно", money(cost), "bad"]]);
        const gain = rnd(2.4, 5.2) * clamp(1 - current / 135, .35, 1);
        state.economy.budget -= cost;
        state.military[key] = clamp(current + gain, 0, 100);
        state.military.research = clamp(state.military.research + .35, 0, 100);
        state.military.industry = clamp(state.military.industry + .25, 0, 100);
        normalizeCore();
        pushNews(state, "Армия", `Модернизация: ${title}`, desc);
        showDecision(`Модернизация: ${title}`, desc, [["Прирост", `+${gain.toFixed(1)} п.п.`, "good"], ["Новый уровень", pct(state.military[key],0), "good"], ["Бюджет", `-${money(cost)}`, "bad"], ["НИОКР", "+0.35 п.п.", "good"]], "good");
      }

      function warOperation(id, mode = "offensive") {
        let w = state.military.wars.find(x => x.id === id);
        if (!w) return;
        w = Object.assign(w, normalizeWar(w));
        const c = state.diplomacy.countries.find(x => x.id === w.enemyId || x.name === w.enemy);
        let balance = calcWarBalance(state, w);
        const plannedCost = ({ offensive: 980, defense: 430, logistics: 560, precision: 720, talks: 180 })[mode] || 980;
        if (state.economy.budget < plannedCost) return showBlockedDecision("Недостаточно бюджета", "Генштаб не может провести решение без финансирования.", [["Нужно", money(plannedCost), "bad"], ["Бюджет", money(state.economy.budget), state.economy.budget > plannedCost ? "good" : "bad"]]);
        let cost = plannedCost;
        let success = 0;
        let title = "";
        let result = "";
        let tone = "good";
        state.economy.budget -= cost;
        if (mode === "offensive") {
          success = clamp(balance.initiative + state.military.training * .12 + state.military.armor * .08 + state.military.artillery * .08 + rnd(-18, 16) - w.intensity * .16, 0, 100);
          w.phase = "наступление";
          w.fatigue = clamp(w.fatigue + 5.5, 0, 100);
          w.supply = clamp(w.supply - rnd(4, 9), 0, 100);
          w.control = clamp(w.control + (success > 58 ? rnd(2.2, 5.8) : -rnd(.8, 2.6)), 0, 100);
          w.warScore = clamp(w.warScore + (success > 58 ? rnd(3.5, 8) : -rnd(2, 5)), -100, 100);
          w.intensity = clamp(w.intensity + rnd(1.2, 4.5), 0, 100);
          w.ourLosses += Math.round(w.intensity * rnd(14, 38) * clamp(1.1 - state.military.medical / 180 - state.military.airSuperiority / 260, .38, 1.35));
          w.enemyLosses += Math.round(w.intensity * rnd(success > 58 ? 26 : 12, success > 58 ? 58 : 30) * clamp(1 + state.military.drones / 220 + state.military.artillery / 260, 1, 1.7));
          title = success > 58 ? "Наступление продвинуло фронт" : "Наступление встретило сопротивление";
          result = success > 58 ? "Штаб сообщает о продвижении, давлении на коммуникации противника и росте военного счета." : "Противник удержал часть рубежей, потери и усталость выросли.";
          tone = success > 58 ? "good" : "bad";
        }
        if (mode === "defense") {
          success = clamp(balance.initiative * .65 + state.military.logistics * .24 + state.military.command * .22 + state.military.airDefense * .08 + rnd(-14, 20), 0, 100);
          w.phase = "оборона";
          w.fatigue = clamp(w.fatigue + 1.7, 0, 100);
          w.supply = clamp(w.supply + rnd(1, 4), 0, 100);
          w.intensity = clamp(w.intensity - (success > 55 ? rnd(2.2, 5.2) : rnd(.2, 1.4)), 0, 100);
          w.control = clamp(w.control + (success > 65 ? rnd(.4, 1.4) : -rnd(.3, 1.2)), 0, 100);
          w.warScore = clamp(w.warScore + (success > 55 ? rnd(.8, 2.6) : -rnd(.6, 1.8)), -100, 100);
          w.ourLosses += Math.round(w.intensity * rnd(6, 18));
          w.enemyLosses += Math.round(w.intensity * rnd(8, 22));
          title = "Оборонительная операция";
          result = success > 55 ? "Линия фронта стабилизирована, интенсивность боя снижена." : "Оборона удержала рубежи частично, давление остается высоким.";
          tone = success > 55 ? "good" : "warn";
        }
        if (mode === "logistics") {
          success = clamp(state.military.industry * .45 + state.military.logistics * .75 + state.military.command * .28 + rnd(-12, 20) - w.intensity * .18, 0, 100);
          w.phase = "перегруппировка";
          w.supply = clamp(w.supply + rnd(7, 15), 0, 100);
          w.fatigue = clamp(w.fatigue - rnd(3, 8), 0, 100);
          w.intensity = clamp(w.intensity - rnd(.8, 2.4), 0, 100);
          state.military.morale = clamp(state.military.morale + .8, 0, 100);
          title = "Логистика усилена";
          result = "Снабжение, ремонт и ротация войск снизили истощение фронта.";
          tone = "good";
        }
        if (mode === "precision") {
          success = clamp(balance.initiative * .72 + state.military.recon * .28 + state.military.drones * .32 + state.military.cyber * .16 + rnd(-20, 18) - w.supply * .05, 0, 100);
          w.phase = "точечные удары";
          w.supply = clamp(w.supply - rnd(1, 3), 0, 100);
          w.intensity = clamp(w.intensity + rnd(.2, 1.2), 0, 100);
          w.warScore = clamp(w.warScore + (success > 60 ? rnd(2.2, 5.5) : -rnd(.7, 2.2)), -100, 100);
          w.control = clamp(w.control + (success > 60 ? rnd(.8, 2.3) : -rnd(.2, 1.1)), 0, 100);
          w.enemyLosses += Math.round(w.intensity * rnd(success > 60 ? 18 : 6, success > 60 ? 42 : 16));
          w.ourLosses += Math.round(w.intensity * rnd(3, 12) * clamp(1.2 - state.military.drones / 140, .35, 1.1));
          title = success > 60 ? "Точный удар нарушил управление" : "Точный удар дал ограниченный эффект";
          result = success > 60 ? "Разведка, БПЛА и киберсредства вывели из строя узел управления противника." : "Цель частично ушла из-под удара, эффект ограничен.";
          tone = success > 60 ? "good" : "warn";
        }
        if (mode === "talks") {
          success = clamp((100 - w.fatigue) * .16 + w.control * .26 + w.warScore * .22 + (c?.relations || 20) * .2 + state.diplomacy.organizations.reduce((s, o) => s + o.influence, 0) * .002 + rnd(-18, 28), 0, 100);
          title = success > 58 ? "Переговоры дали перемирие" : "Переговоры сорвались";
          if (success > 58) {
            result = `${w.enemy} соглашается на прекращение огня под международные гарантии.`;
            finishWar(state, w, w.control >= 54 ? "victory" : "ceasefire", title, result);
          } else {
            result = "Стороны не согласовали условия, фронт остается активным.";
            w.fatigue = clamp(w.fatigue + 1.5, 0, 100);
            if (c) c.relations = clamp(c.relations - 2.5, 0, 100);
            tone = "warn";
          }
        }
        balance = calcWarBalance(state, w);
        if (mode !== "talks" || success <= 58) {
          state.military.morale = clamp(state.military.morale + (success > 58 ? 1.5 : -1.8), 0, 100);
          state.politics.popularity = clamp(state.politics.popularity + (success > 58 ? .4 : -1.1), 0, 100);
          pushNews(state, "Армия", title, `На направлении ${w.enemy}: ${result}`);
          if (w.control >= 88 || w.warScore >= 72) finishWar(state, w, "victory", "Военная победа", `${w.enemy} принимает условия прекращения боевых действий.`);
          else if (w.control <= 12 || w.warScore <= -72) finishWar(state, w, "defeat", "Невыгодное перемирие", `Кабинет вынужден остановить конфликт с ${w.enemy}.`);
        }
        showDecision(title, result, [["Вероятность", pct(success,0), success > 58 ? "good" : "warn"], ["Инициатива", pct(balance.initiative,0), balance.initiative > 55 ? "good" : "warn"], ["Силы", `${Math.round(balance.ownPower)} / ${Math.round(balance.enemyPower)}`, balance.ownPower >= balance.enemyPower ? "good" : "bad"], ["Фронт", pct(w.control,0), w.control > 50 ? "good" : "bad"], ["Военный счет", w.warScore.toFixed(1), w.warScore >= 0 ? "good" : "bad"], ["Стоимость", `-${money(cost)}`, "bad"]], tone);
      }

      function techLab() {
        const cost = 900 + state.tech.labs * 180;
        if (state.economy.budget < cost) return notify("Недостаточно бюджета на лабораторию.");
        state.economy.budget -= cost;
        state.tech.labs++;
        state.tech.points += 15;
      }

      function techFund() {
        if (state.economy.budget < 420) return notify("Недостаточно бюджета.");
        state.economy.budget -= 420;
        state.tech.points += 90;
        state.population.education += .5;
      }

      function socialAction(type) {
        const p = state.population, e = state.economy;
        if (type === "family") { e.budget -= 500; p.birthRate += .3; p.happiness += 1.2; }
        if (type === "migration") { e.budget -= 240; p.migration += .08; p.discontent += .3; e.unemployment += .08; }
        if (type === "police") { e.budget -= 360; p.crime -= 2.5; state.politics.protests += .4; }
        if (type === "housing") { e.budget -= 720; p.poverty -= 1.4; p.happiness += 1.8; e.growth += .12; }
        if (type === "culture") { e.budget -= 180; p.happiness += 1.1; state.politics.popularity += .8; }
        normalizeCore();
        pushNews(state, "Политика", "Социальная политика", "Обновлены демография, уровень жизни и общественные настроения.");
      }

      function generateNews(category) {
        pushNews(state, category, newsTitle(category), `Экстренная сводка категории "${category}" сформирована пресс-службой на дату ${formatDate(state.date)}.`);
      }

      function addLaw() {
        state.politics.laws.unshift({ name: "Новый закон " + (state.politics.laws.length + 1), effect: "настраиваемый эффект через редактор", support: 50 });
      }

      function addParty() {
        state.politics.parties.push({ name: "Новая партия " + (state.politics.parties.length + 1), ideology: "центризм", seats: 0, support: 3, coalition: false });
        normalizePercentages();
      }

      function normalizePercentages() {
        const parties = state.politics.parties;
        const sum = parties.reduce((a, b) => a + num(b.support), 0) || 1;
        for (const p of parties) {
          p.support = p.support / sum * 100;
          p.seats = Math.round(state.politics.parliamentSeats * p.support / 100);
        }
        normalizeGovernance();
        normalizeCore();
      }

      function normalizeGovernance() {
        const g = state.governance;
        if (!g) return;
        g.agenda.forEach(a => {
          a.pressure = clamp(a.pressure, 0, 100);
          a.trend = clamp(a.trend, -5, 5);
        });
        g.services.forEach(s => {
          s.level = clamp(s.level, 0, 100);
          s.capacity = clamp(s.capacity, 0, 100);
          s.stress = clamp(s.stress, 0, 100);
        });
        g.sectors.forEach(s => {
          s.output = clamp(s.output, 0, 100);
          s.jobs = clamp(s.jobs, 0, 60);
          s.export = clamp(s.export, 0, 100);
          s.stateShare = clamp(s.stateShare, 0, 100);
        });
        g.projects.forEach(p => {
          p.progress = clamp(p.progress, 0, 100);
          p.risk = clamp(p.risk, 0, 100);
          p.spent = Math.max(0, num(p.spent));
        });
        g.crises.forEach(c => c.severity = clamp(c.severity, 0, 100));
        g.media.trust = clamp(g.media.trust, 0, 100);
        g.media.freedom = clamp(g.media.freedom, 0, 100);
        g.media.propaganda = clamp(g.media.propaganda, 0, 100);
        g.media.polarization = clamp(g.media.polarization, 0, 100);
        g.intelligence.counterIntel = clamp(g.intelligence.counterIntel, 0, 100);
        g.intelligence.cyberThreat = clamp(g.intelligence.cyberThreat, 0, 100);
        g.intelligence.foreignNetworks = clamp(g.intelligence.foreignNetworks, 0, 100);
        g.intelligence.domesticRisk = clamp(g.intelligence.domesticRisk, 0, 100);
      }

      function normalizeCore() {
        normalizeGovernance();
        const e = state.economy, p = state.politics, pop = state.population, m = state.military;
        e.inflation = clamp(e.inflation, -2, 80);
        e.unemployment = clamp(e.unemployment, 1, 45);
        e.smallBusiness = clamp(e.smallBusiness, 0, 100);
        e.bankruptcies = clamp(e.bankruptcies, 0, 40);
        p.popularity = clamp(p.popularity, 0, 100);
        p.corruption = clamp(p.corruption, 0, 100);
        p.lobbyism = clamp(p.lobbyism, 0, 100);
        p.protests = clamp(p.protests, 0, 100);
        p.strikes = clamp(p.strikes, 0, 100);
        p.coalition = clamp(p.coalition, 0, 100);
        p.opposition = clamp(p.opposition, 0, 100);
        if (p.constitution) {
          p.constitution.rights = clamp(p.constitution.rights, 0, 100);
          p.constitution.courtIndependence = clamp(p.constitution.courtIndependence, 0, 100);
        }
        pop.happiness = clamp(pop.happiness, 0, 100);
        pop.discontent = clamp(pop.discontent, 0, 100);
        pop.crime = clamp(pop.crime, 0, 100);
        pop.life = clamp(pop.life, 0, 100);
        pop.education = clamp(pop.education, 0, 100);
        pop.poverty = clamp(pop.poverty, 0, 80);
        m.readiness = clamp(m.readiness, 0, 100);
        m.morale = clamp(m.morale, 0, 100);
        m.cyber = clamp(m.cyber, 0, 100);
        m.industry = clamp(m.industry, 0, 100);
        m.research = clamp(m.research, 0, 100);
        m.contractShare = clamp(m.contractShare, 0, 100);
        ["logistics","training","recon","drones","artillery","armor","airSuperiority","navalPower","medical","command","warExhaustion","veterans"].forEach(key => {
          m[key] = clamp(num(m[key]), 0, 100);
        });
        m.wars = (m.wars || []).map(normalizeWar);
      }

      function setEditorPath(path, value, asNumber) {
        const final = asNumber ? num(value) : value;
        if (path.startsWith("selectedRegion.")) {
          const r = state.regions.find(x => x.id === selectedRegionId);
          if (r) r[path.split(".")[1]] = final;
          return;
        }
        if (path.startsWith("selectedCountry.")) {
          const c = state.diplomacy.countries.find(x => x.id === selectedCountryId);
          if (c) c[path.split(".")[1]] = final;
          return;
        }
        const parts = path.split(".");
        let obj = state;
        for (let i = 0; i < parts.length - 1; i++) obj = obj[parts[i]];
        obj[parts[parts.length - 1]] = final;
        normalizeCore();
      }

      function saveSlot(slot) {
        const slots = loadSlots();
        slots[slot] = serializeStateForStorage(state, "normal");
        if (saveSlots(slots)) notify(`Слот ${slot} сохранён.`);
      }

      function loadSlot(slot) {
        const slots = loadSlots();
        if (!slots[slot]) return notify("Слот пуст.");
        state = migrateState(slots[slot]);
        saveState();
        notify(`Слот ${slot} загружен.`);
      }

      function exportSave() {
        const blob = new Blob([JSON.stringify(state, null, 2)], { type: "application/json" });
        const a = document.createElement("a");
        a.href = URL.createObjectURL(blob);
        a.download = `${state.country.name.replace(/\s+/g, "_")}_save.json`;
        a.click();
        URL.revokeObjectURL(a.href);
      }

      function importSaveFile() {
        const file = importFile.files?.[0];
        if (!file) return;
        const reader = new FileReader();
        reader.onload = () => {
          try {
            state = migrateState(JSON.parse(String(reader.result)));
            saveState();
            notify("Сохранение импортировано.");
            render();
          } catch {
            notify("Не удалось прочитать JSON.");
          }
        };
        reader.readAsText(file);
      }

      function copyJson() {
        const text = document.getElementById("saveJson")?.value || JSON.stringify(state);
        navigator.clipboard?.writeText(text).then(() => notify("JSON скопирован."), () => notify("Скопируйте текст вручную."));
      }

      function loadJsonText() {
        const text = document.getElementById("saveJson")?.value;
        if (!text?.trim()) return notify("Вставьте JSON сохранения в поле.");
        try {
          state = migrateState(JSON.parse(text));
          saveState();
          notify("JSON загружен.");
        } catch {
          notify("Ошибка JSON.");
        }
      }

      function compactStorageAction() {
        const compacted = compactExistingSlots();
        const saved = saveState({ force: true });
        if (compacted || saved) notify("Хранилище оптимизировано.");
      }

      function confirmClearSlots() {
        modal = {
          title: "Очистить слоты",
          body: `<p class="subtle">Будут удалены только ручные слоты 1-5. Текущее автосохранение останется.</p><div class="actions"><button class="danger" data-action="really-clear-slots">Очистить слоты</button><button data-action="close-modal">Отмена</button></div>`
        };
      }

      function confirmNewGame() {
        modal = {
          title: "Новая игра",
          body: `<p class="subtle">Текущее автосохранение будет удалено. Слоты останутся доступны.</p><div class="actions"><button class="danger" data-action="really-new-game">Удалить автосохранение</button><button data-action="close-modal">Отмена</button></div>`
        };
      }

      function startFreshGame() {
        localStorage.removeItem(STORAGE_KEY);
        state = null;
        modal = null;
        activeTab = "dashboard";
        setupPage = "state";
        selectedRegionId = null;
        selectedCountryId = null;
        drawMode = false;
        drawingPoints = [];
        setupDraft = defaultSetupDraft();
      }

      function clearSaveSlots() {
        localStorage.removeItem(SLOTS_KEY);
        modal = null;
        notify("Слоты очищены.", "good", "Сохранения");
      }

      document.addEventListener("click", event => {
        const svg = event.target.closest("#countryMap");
        if (!svg || !drawMode || event.target.closest("[data-action='select-region']")) return;
        const pt = svg.createSVGPoint();
        pt.x = event.clientX;
        pt.y = event.clientY;
        const p = pt.matrixTransform(svg.getScreenCTM().inverse());
        drawingPoints.push([clamp(p.x, 0, 900), clamp(p.y, 0, 520)]);
        render();
      });

      init();
    })();
  </script>
</body>
</html>
